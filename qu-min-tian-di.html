  1: {
    title: "早市的燈",
    body: `<p>巷口的早市五點就開了。</p><p></p><p>阿婆的豆花攤總是第一個亮燈。她一輩子沒聽過「做生意」這兩個字，只知道每天凌晨三點起床，把泡好的黃豆一顆顆倒進石磨裏，推它轉三百圈，做出一鍋能賣到中午的豆花。</p><p></p><p>「阿婆，爲什麼不買個機器？」附近的中學生路過，常這樣問。</p><p></p><p>阿婆擦著手，笑紋擠在眼角：</p><p></p><p>「機器轉得快，可是我一個人推不動。人老了，只能慢慢來。」</p><p></p><p>她的小攤沒有名字，沒有招牌，連二维码都是兒子上週強制貼上的。可是來的人都知道：這碗豆花，鹹的比甜的好吃。</p><p></p><p>老陳是對面理髮廳的師傅，每天固定買一碗甜的。</p><p></p><p>「阿婆，你今天豆花比較嫩。」</p><p></p><p>「你昨天就說比較老。」</p><p></p><p>「所以我天天說啊。」</p><p></p><p>阿婆搖頭，還是多給他一勺花生。</p><p></p><p>巷口養著一隻三花貓。沒人知道是誰養的，只知道每到豆花攤開張，牠一定準時出現，蹲在板凳上，盯著阿婆的筷子。</p><p></p><p>「小花，你也是很愛吃甜的？」阿婆問。</p><p></p><p>貓咪眨眼。</p><p></p><p>賣菜的林伯騎三輪車進巷時，總會按兩下喇叭，嚇得小花跳上屋頂。但阿婆不怕，她只顧著把豆腐搬到攤上。</p><p></p><p>「阿婆，今天行情不錯。」林伯邊卸菜邊說。</p><p></p><p>「什麼行情？」</p><p></p><p>「你沒涨价。」</p><p></p><p>阿婆笑，把一塊豆腐塞給小花。</p><p></p><p>貓咪叼著豆腐，消失在清晨的霧裏。</p><p></p><p>──</p><p></p><p>這個城市很急。每個人都在跑，趕捷運，趕打卡，趕 截止時間，趕一場又一場別人定的比賽。</p><p></p><p>但巷口的早市不趕。</p><p></p><p>它只等一盞燈亮，等一碗豆花，等一隻貓咪跳上板凳。</p><p></p><p>等你願意慢下來，聽阿婆說一句：</p><p></p><p>「雖然很慢，可是我一個人，也走到了今天。」</p><p></p><p>──</p><p></p><p>生活不是故事。</p><p></p><p>生活是最後一章。</p>`
  },
  2: {
    title: "便利商店的對面",
    body: `<p>便利商店的燈光是這條巷子裏唯一不會睡的顏色。</p><p></p><p>小偉在對面停車場當夜班守衛，十四個月了。他的工作是看著夜班人把車停好，不讓人偷東西，偶爾幫喝醉的人找回手機。薪水不高，但他說很適合他。</p><p></p><p>「爲什麼？」朋友問。</p><p></p><p>「因爲晚上比較安靜。」小偉說，「而且我可以同時看書。」</p><p></p><p>他的守衛室只有一張桌子、一把摺疊椅、一台老舊的熱水器，還有一盞別人不要的檯燈。燈光是黃的，他說黃光比較護眼。</p><p></p><p>每天晚上十點到清晨六點，他的生活几乎是固定的：</p><p>十點半：泡一杯咖啡，坐下來讀第三章。</p><p>十一點半：巡一次停車場，和老闆的貓打招呼。</p><p>凌晨一點：上次廁所，顺便看便利商店的貨架有没有新零食。</p><p>凌晨兩點：回去讀書，或者寫點東西。</p><p></p><p>便利商店的夜班是一個叫阿美的女生。她做了三年，說從來沒有看過同一張臉連續三天出現。</p><p></p><p>「你是例外。」她說。</p><p></p><p>小偉笑：「因爲我住在對面。」</p><p></p><p>阿美總會留一個熱便當給他。有時候是滷肉飯，有時候是咖哩，偶爾是前一晚賣剩下的關東煮。她說反正到最后都要丢，不如給看得見的人吃。</p><p></p><p>「你不怕我是壞人嗎？」小偉有一次問。</p><p></p><p>阿美拉下統夜班的簾子，指了指外面馬路。</p><p></p><p>「壞人不會每天早上騎腳踏車來還你丢在桌上的原子筆。」</p><p></p><p>小偉楞了一下，才想起那是两周前的事了。</p><p></p><p>那是巷口的故事。</p><p>不是愛情，也沒有什麼戲劇性的轉折。</p><p>只是兩個在深夜裏勉強醒著的人，剛好看見對方而已。</p><p></p><p>──</p><p></p><p>便利商店的灯每天早上六點關。</p><p>小偉這時候會站起來，活動筋骨，把守衛室的椅子推回桌子底下。</p><p></p><p>阿美從玻璃門裏對他點點頭。</p><p>他點點頭。</p><p></p><p>然後他騎著腳踏車去早餐店買兩個饅頭，回家睡覺。</p><p>就這樣，十四個月。</p><p></p><p>他說這樣很好。</p>`
  },
  3: {
    title: "早餐店的板凳",
    body: `<p>早餐店在巷口轉角。老闆姓陳，大家都叫他陳伯。</p><p></p><p>陳伯五點整開門，五點十分油鍋熱，五點十五分第一批蛋餅出爐。四十年了，從沒遲到過。隔壁便利商店的阿雄說：「陳伯，你都不用鬧鐘的嗎？」</p><p></p><p>陳伯笑：「鬧鐘是給懶人用的。我每天四點半自然醒。」</p><p></p><p>阿雄不信，直到有一晚輪值加班到凌晨三點，路過早餐店，看見陳伯一個人坐在店裡剝蒜。</p><p></p><p>「怎麼這麽早？」阿雄敲敲玻璃門。</p><p></p><p>「蒜要現剝才香。」陳伯抬頭笑。</p><p></p><p>早餐店只有五張板凳。從陳伯開店那天就在，坐得發亮，油漆磨得幾乎露出木頭。</p><p></p><p>來的人都很固定：</p><p>- 七點：國小老師買兩個招牌飯糰</p><p>- 七點二十：工地師傅點三碗鹹豆漿</p><p>- 八點：阿銘銀行員，永遠坐在最左邊那張</p><p></p><p>阿銘坐最左邊那張不是因為喜歡，是因為他每天早上七點五十分到，那張板凳從來沒有被占。</p><p></p><p>有一天八點零五分，阿銘來到早餐店，發現最左邊的板凳坐了別人。</p><p></p><p>是一個穿著高中校服的女孩子，低著頭看課本，腳邊放著書包，手裡捧著一杯熱豆漿。</p><p></p><p>阿銘猶豫了一下，坐在了右邊第二張。</p><p></p><p>陳伯把蛋餅端出來，看了阿銘一眼，又看了看那個女孩子，沒有說話。</p><p></p><p>就這樣過了一個禮拜。那個女孩子每天都在阿銘來之前占了最左邊的板凳。</p><p></p><p>第八天，阿銘提早了五分鐘到。他坐在了最左邊的板凳上。</p><p></p><p>女孩子來的時候，愣了一下，然後坐在了他旁邊。</p><p></p><p>從那天起，他們每天早上七點五十分一起出現在早餐店。陳伯的蛋餅還是五點十五分出爐，阿雄還是三點下班路過剝蒜。</p><p></p><p>有時候青春不是轟轟烈烈的愛情，而是兩個陌生人在早餐店，因為同一張板凳，開始了彼此的早晨。</p><p></p><p>──</p><p></p><p>阿銘說，他後來才知道那個女孩子是對面中學三年級的學生。她每天七點四十五分出發，之所以坐那張板凳，是因為那張凳子距離油鍋最近，早上不會太冷。</p><p></p><p>「那你為什麽後來不提早？」陳伯問。</p><p></p><p>阿銘笑：「因為我想看看，她會不會主動坐過來。」</p><p></p><p>陳伯點頭，然後順手往鍋子里打了第二顆蛋。</p>`
  },
  4: {
    title: "雨天的收音機",
    body: `<p>便利商店對面巷子裏，住著一位收舊電器的小販，大家都叫他老周。</p><p></p><p>老周的攤子就在騎樓下，一塊帆布遮著，下面堆著壞掉的錄音機、舊收音機、電視機殼，還有幾台看起來至少二十年的冷氣機。他從不叫賣，只是坐在小凳子上看書，有人路過就抬抬頭。</p><p></p><p>下雨那天，阿美從便利商店出來，手裏捧著一個紙箱，裝著一台舊收音機。</p><p></p><p>「周伯，這個還能修嗎？」阿美問。</p><p></p><p>老周接過來，擰開後蓋看了看，搖了搖天線，又擰了擰旋鈕。雜音很大，但他聽到了很短的一段音樂。</p><p></p><p>「能修。」他說，「不過要三天。」</p><p></p><p>阿美點點頭，把收音機留在攤子上。她說那是她爺爺留下來的，裏面包著一張泛黃的歌詞。</p><p></p><p>第三天傍晚，阿美下班後來取收音機。</p><p></p><p>老周遞過來，天線擦得很亮，按鈕也換過了。打開電源，立刻傳出清晰的聲音——是一首老歌，旋律很慢，像從很遠的地方飄過來。</p><p></p><p>阿美愣了愣，才認出來那是爺爺當年最愛聽的那首。</p><p></p><p>「多少钱？周伯。」</p><p></p><p>「不用。」老周指了收音機底部一個很小的螺絲釘，「這裏原本鬆了。我把它扭緊了，更穩定了。歌曲就回來了。」</p><p></p><p>阿美說謝謝，轉身要走，又停了下來。</p><p></p><p>「你爲什麽不收錢？」</p><p></p><p>「因爲我爺爺以前也修收音機。」老周微笑，「何況這首歌，讓我想起我年輕的時候。」</p><p></p><p>那晚阿美回家，把收音機擱在窗邊。雨還在滴答滴答，但音樂很安靜。她第一次覺得，原來壞掉的东西，不是只能丢掉，也可以被一個人靜靜地修好。</p><p></p><p>就這樣，巷子裏多了一個不成文的約定：只要是老周看過的舊電器，主人總會在修好的那一天，帶一杯熱咖啡放在他的攤子上。</p><p></p><p>不用多說話。有時候，最深的感情，就在一臺收音機和一場雨之間。</p><p></p><p>──</p><p></p><p>老周說：「心裏都有一台壞掉的收音機。問題是有沒有人願意，花三天時間把它修好。」</p><p></p><p>阿美點頭。她開始覺得，老周修的不只是電器。他在修那些被這個城市遺忘的聲音。</p>`
  },
  5: {
    title: "天台上的一杯水",
    body: `<p>巷口一棟大樓的天台上，住著一個退休的郵差，大家都叫他林伯。</p><p></p><p>林伯六十五歲，退休前送了四十二年信。他的腿不好，爬樓梯要慢慢來，但每天下午三點，他一定會爬到大樓頂樓，坐在一張有裂紋的塑料椅子上。</p><p></p><p>他的「辦公室」很簡單：一個鋁合金保溫壺、一個馬克杯、一塊抹布，還有一本寫滿地址的舊記事本。</p><p></p><p>樓下住著一個大學生，叫阿杰。阿杰大三，準備考試，每天待在房裡讀書，壓力很大。</p><p></p><p>有一天，阿杰口渴，到頂樓想找水喝。他推開鐵門，看見林伯坐在那裡，手裡拿著馬克杯，望著遠方的山。</p><p></p><p>「林伯，你有沒有多餘的水？」阿杰問。</p><p></p><p>林伯點點頭，指了指保溫壺。</p><p></p><p>「謝謝。」阿杰倒了一杯，坐了下來。</p><p></p><p>他們就這樣聊了起來。林伯說他以前送信的時候，見過很多有趣的地址：山上的小廟、海邊的木屋、連在地圖上都找不到的小巷。他說每一封信，都是一個人的一部分故事。</p><p></p><p>阿杰聽了，忽然覺得自己的考試好像也沒那麼重要了。</p><p></p><p>「林伯，你退休後都在做什麼？」</p><p></p><p>「看信。」他說，「不是讀信，是看。每天坐在這裡，看看遠方，想想以前送過信的人，現在過得怎麼樣。」</p><p></p><p>阿杰接著問：「你不會覺得無聊嗎？」</p><p></p><p>「無聊？」林伯笑了，「人生哪有時間無聊。你想想，你早上醒來，還有地方可以坐，有杯子可以拿，有水可以喝，已經是福氣了。」</p><p></p><p>阿杰點點頭，喝光了杯子裡的水。</p><p></p><p>那天之後，阿杰每天都到頂樓坐一會兒。他讀書讀累了，就上去喝杯水，聽林伯講以前的故事。</p><p></p><p>就這樣過了兩個月。</p><p></p><p>考試那天，阿杰很緊張。他早起到頂樓，覺得喉嚨很乾。</p><p></p><p>他推開鐵門，發現林伯已經在那裡了，手裡拿著兩個馬克杯。</p><p></p><p>「早就知道你今天考試。」林伯微笑，「這杯水，代表順利。」</p><p></p><p>阿杰接過水，喝了一口，忽然覺得心中踏实了很多。</p><p></p><p>考試結束後，阿杰跑到頂樓，想謝謝林伯。</p><p></p><p>但鐵門鎖著。</p><p></p><p>樓下的管理員告訴他，林伯昨天摔了一跤，住院了。</p><p></p><p>阿杰拿著那本舊記事本，才知道林伯沒有家人，也沒有朋友住在附近。他唯一的陪伴，就是那本寫滿地址的書，和每天送水給樓上那個讀書的年輕人。</p><p></p><p>阿杰沒有哭。他只是靜靜地站在天台，手裡拿著馬克杯，望著遠方。</p><p></p><p>從那天起，阿杰每天下午三點都會到大樓頂樓，坐在林伯的塑料椅子上，手裡拿著馬克杯，望著遠方的山。</p><p></p><p>他知道，林伯不是離開了。</p><p></p><p>他只是換了一個地方，繼續看遠方。</p><p></p><p>──</p><p></p><p>有時候，一杯水代表的不是解渴。</p><p></p><p>它代表的是一個人願意把自己僅有的東西，分給另一個人。</p><p></p><p>而那個收到水的人，會記住這個味道很久很久。</p>`
  },
  6: {
    title: "夜市的燈",
    body: `<p>夏天的夜市總是從七點開始熱鬧。</p><p></p><p>阿明每天下午五點半到市場幫媽媽顧水果攤。媽媽賣芭樂和芒果，他負責秤重、裝袋、找錢。</p><p></p><p>夜市的人來來去去，他最喜歡的是每週三來買芭樂的老伯。老伯每次都買三顆，從來不講價，还会多給十塊錢當小費。</p><p></p><p>「给你拿去冰棒。」老伯說。</p><p></p><p>阿明推辭不過，只好收下。他知道老伯兒子公司上市，根本不在乎這十塊錢。</p><p></p><p>就這樣過了一個夏天。</p><p></p><p>某天，老伯突然沒來。</p><p></p><p>阿明等了三天，第四天終於看見老伯走過來，卻是坐著輪椅，身邊跟著一個年輕人。</p><p></p><p>「陳伯，你怎麼了？」阿明迎上去。</p><p></p><p>老伯笑了笑：「心臟動了手術，現在慢慢復原。」</p><p></p><p>阿明點點頭，幫老伯裝了三顆芭樂，像往常一樣。</p><p></p><p>老伯接過袋子，從口袋裡掏出十塊錢，放在桌子上。</p><p></p><p>「今天沒有小費了。」老伯說，「我把我的夜市，傳給你了。」</p><p></p><p>阿明楞了一下。</p><p></p><p>老伯的年輕人接著說：「爸爸說，以後每週三的芭樂，都由你來選。你可以幫他選，也可以幫自己選。」</p><p></p><p>阿明點點頭，把十塊錢放進抽屜。</p><p></p><p>那天晚上，夜市結束後，他拿著十塊錢去買了三支冰棒。一支給自己，兩支放在老伯的水果攤上。</p><p></p><p>他知道，老伯的夜市沒有結束。</p><p></p><p>只是換了一個人，繼續選那三顆芭樂。</p><p></p><p>有時候，傳承不是把東西交給別人。</p><p></p><p>而是讓那個人，願意繼續為你，做那件小事。</p><p></p><p>夜市的路燈還亮著。</p><p></p><p>阿明收拾攤子的時候，聽見遠處傳來歌聲。</p><p></p><p>他抬頭看，是老伯的年輕人，坐在輪椅上，邊哼歌邊等妈妈。</p><p></p><p>阿明笑了。</p><p></p><p>他知道，這個夜市，會一直熱鬧下去。</p>`
  },
  7: {
    title: "午後的雨",
    body: `<p>阿明從小就記得，媽媽總是在雨天關店。</p><p></p><p>水果攤的帆布棚每次被風吹得咚咚響，媽媽就會放下秤，靜靜地望著巷口。他知道媽媽在等，但他從來沒有問過等什麼。</p><p></p><p>那天下午，雨忽然大了起來。市場的人潮散得特別快，阿明正想把剩下的香蕉裝進箱子，遠處傳來一個女人的聲音。</p><p></p><p>「不好意思，請問這裡還有鳳梨嗎？」</p><p></p><p>阿明抬頭，看見一個撐著紅傘的女人，褲腳濕了一圈。她約莫四十出頭，手裡牽著一個小女孩，背後背著一只磨損的帆布包。</p><p></p><p>「有，要幾顆？」阿明問。</p><p></p><p>女人指了指小女孩：「兩顆，酸的。」</p><p></p><p>阿明挑了兩顆頂尖的鳳梨，秤重、裝袋。小女孩一直盯著他看，然後忽然說：「哥哥，你的手好快。」</p><p></p><p>他笑了笑。媽媽在裡面喊了一聲，示意他把錢收好。</p><p></p><p>「你媽媽人呢？」阿明問。</p><p></p><p>女人的臉閃過一絲猶豫：「我去探望一個人，順路經過這裡。」</p><p></p><p>雨小了一點。女人牽著小女孩轉身要走，小女孩忽然回頭，遞了一張畫給阿明。畫上是一顶帽子、一顆鳳梨，還有一棟雙層樓的房子。</p><p></p><p>「謝謝你今天的鳳梨。」小女孩說。</p><p></p><p>那天晚上，阿明把畫夾在賬本裡。媽媽問他是誰給的，他沒有回答。</p><p></p><p>這件事過了三個月，媽媽突然說要出門一天，把水果攤暫時交給阿明。出發前，她給了阿明一把鑰匙，說：「如果下午五點我沒有回來，你就去巷口七號。」</p><p></p><p>阿明點點頭。</p><p></p><p>五點的時候，媽媽沒有回來。</p><p></p><p>他關了攤子，冒著小雨走到巷口七號。那是一棟老式公寓，鐵門生了鏽，門口放著一個藤編座椅。</p><p></p><p>門開了。撐紅傘的女人站在那裡，手裡捧著一杯熱茶。</p><p></p><p>「進來了。」她說。</p><p></p><p>阿明跟著她上樓。屋裡很暖，牆上掛滿了畫，每一幅都是水果、陽光，和母親的手。</p><p></p><p>「你媽媽以前是這裡的老師，」女人說，「她教我畫畫。我生病的時候，她每天放學後來陪我。」</p><p></p><p>阿明看著牆上的畫，忽然明白媽媽為什麼總是在雨天望著巷口。</p><p></p><p>「她今天去醫院看我，」女人笑著說，「所以我把畫，送你一張。」</p><p></p><p>阿明掏出賬本裡的畫，遞給她。</p><p></p><p>女人接過畫，眼眶紅了。</p><p></p><p>窗外，雨停了。夕陽從雲裡伸出來，照在巷口的帆布棚上，像一塊發光的銀布。</p><p></p><p>那一天之後，阿明每天都會在放學後來這裡，學怎麼畫鳳梨。</p><p></p><p>他才知道，傳承不一定是要接過什麼，有時候，它只是一張畫，一場雨，和兩個人都不說出口的想念。</p>`
  },
  8: {
    title: "舊收音機",
    body: `<p>阿明學會畫鳳梨之後，女人開始教他畫別的東西。</p><p></p><p>「畫什麼都可以，」她說，「只要是你自己看過的東西。」</p><p></p><p>於是他開始畫水果攤的天涯、黃昏的巷口、媽媽秤重時的手指。他還畫了媽媽背對著他整理香蕉的背影，線條很生硬，但他很喜歡。</p><p></p><p>某天，他在公寓角落發現一台舊收音機。木質的外殼磨得發亮，旋鈕掉了兩個，但還有聲音。</p><p></p><p>「這是我爺爺留下來的，」女人說，「你要不要試試修？」</p><p></p><p>阿明從來沒有修過收音機。他把收音機拆開，指尖碰到一層薄灰。零件還完整，只是接線松了。他小心地重新接好，按下開關。</p><p></p><p>先是靜電聲，然後是音樂——一首老歌，他聽過媽媽哼過。</p><p></p><p>「爺爺以前每晚都聽這個台，」女人說，「他說，音樂只要還有人聽，就不會消失。」</p><p></p><p>那天晚上，阿明把收音機帶回家。媽媽聽到了音樂，愣了一下，然後微笑。</p><p></p><p>「你還記得嗎？」媽媽說，「你小時候，每天晚上都是聽著這首歌睡著。」</p><p></p><p>阿明點點頭。他忽然覺得，畫畫和修收音機沒有什麼不一樣。都是在尋找遺失的細節，然後把它們重新連起來。</p><p></p><p>他決定把下一張畫的主角，設定為一台舊收音機。</p><p></p><p>從那天起，巷口七號不只是教畫畫的地方。這裡還有音樂，有故事，有兩個用各自方式記住過去的人。</p><p></p><p>雨偶爾還會下，但他們已經不再怕了。</p>`
  },
  9: {
    title: "夜校",
    body: `<p>夏天結束的時候，女人問阿明：「你想不想繼續上課？」</p><p></p><p>阿明點點頭。於是他開始每個週末下午，去巷口七號學畫。</p><p></p><p>女人的名字叫林姐，以前是國小美術老師。生病之後，她辭了職，靠畫畫和賣一點手工藝品過日子。小女孩是她姪女，名叫樂樂，每個周末都會來。</p><p></p><p>「林姊為什麼不教別的學生？」阿明問樂樂。</p><p></p><p>樂樂搖搖頭：「她不喜歡太多人，她說真正想學的人，會自己找上門。」</p><p></p><p>阿明把那台修好的收音機帶到課堂上。林姐聽了那首老歌，靜靜地閉上眼睛。</p><p></p><p>「謝謝你讓它重新響起，」她說。</p><p></p><p>那天，林姐給了阿明一個新的主題：「畫一個你最想念的人。」</p><p></p><p>阿明畫了老伯。他沒有見過老伯年輕的時候，但憑著記憶裡老人坐在輪椅上微笑的樣子，他把線條勾勒出來。旁邊還畫了一顆芭樂，和一個小小的攤位。</p><p></p><p>林姐看了很久。</p><p></p><p>「你爺爺以前也是這樣賣水果的，」她說，「我把畫借回家，掛一個晚上，好嗎？」</p><p></p><p>阿明點點頭。</p><p></p><p>他知道，自己畫的不只是一位老人的臉，更是一種延續——夜市、芭樂、輪椅、歌曲，都還在。</p><p></p><p>那天晚上，他在畫紙背面寫了一句話：「想念從不因為沉默而消失。」</p><p></p><p>第二天，他把畫拿回來時，林姐在背面也寫了一句：「所以我們要一直說、一直畫、一直唱。」</p><p></p><p>阿明把那一頁夾回畫本裡。</p><p></p><p>從此以後，每個周末，他都會帶著新的畫過來，帶著新的故事。</p><p></p><p>有時候樂樂會畫他自己；有時候林姐會彈吉他（那是她最近剛學會的），讓音樂和畫一起流動。</p><p></p><p>這個城市還是有雨，但阿明不再只是等待雨停。他学会了自己走進巷口，推開那扇生锈的鐵門。</p><p></p><p>他知道，有人在等他。</p><p></p><p>而且他知道，無論多大的雨，都澆不滅一盞為愛亮著的燈。</p>`
  },
  10: {
    title: "第一次展覽",
    body: `<p>樂樂的學校舉辦年度美展，林姐答應幫樂樂準備作品。</p><p></p><p>「阿明要不要也一起參加？」林姐問。</p><p></p><p>阿明遲疑了一下。他從來沒有想過把自己的畫拿給別人看。</p><p></p><p>「就當練習，」林姐說，「畫你最真實的感覺。」</p><p></p><p>於是他畫了那個夏天的夜市：燈泡一盞一盞亮起來，媽媽的水果攤在角落，老伯的輪椅在照片裡，收音機放在旁邊，畫旁的題目是：〈傳承〉。</p><p></p><p>評審當天，林姐沒有陪他去。她說：「你自己去。」</p><p></p><p>展場在學校禮堂，四周都是小朋友的作品。阿明的畫看起來並不起眼，線條不夠圓潤，顏色也有點混。但每個經過的人，都會在夜市那幅前停一下。</p><p></p><p>有個老先生指著老伯的輪椅問：「這也是你自己寫的嗎？」</p><p></p><p>阿明點點頭。</p><p></p><p>「那時我也在夜市，」老先生說，「買過陳伯的芭樂。他總是多送我一顆。」</p><p></p><p>阿明低头看著自己的畫，忽然覺得，畫好像不只是畫。它是橋，把兩個從來沒有說過話的人，連在一起。</p><p></p><p>晚上，他把這個故事告訴林姐。</p><p></p><p>「這就是畫的意義，」林姐說，「讓看不見的，變看得見。」</p><p></p><p>第二天，林姐拿了一張給阿明。畫的人是她自己，坐在窗邊畫畫，陽光落在畫紙上。題目寫著：〈午後的开始〉。</p><p></p><p>她把畫送給阿明，說：「以後我們每年都一起參展，好嗎？」</p><p></p><p>阿明點點頭。</p><p></p><p>那張畫他帶回家，夾在賬本和舊收音機說明書之間。媽媽看到了，沒有說什麼，只是微笑。</p><p></p><p>從那天起，阿明的生活不再只有水果攤和畫本。他知道，無論將來走到哪裡，那盞為他亮的燈，一直在巷口。</p><p></p><p>他不必怕黑。</p><p></p><p>因為他已經學會，如何在雨裡，找到自己的方向。</p>`
  },
  11: {
    title: "冬天的禮物",
    body: `<p>冬天剛開始的時候，媽媽說要阿明一個人顧摊子兩個禮拜。</p><p></p><p>「為什麼？」阿明問。</p><p></p><p>媽媽指了指家裡：「阿公腿不好，我要帶他去複診。」</p><p></p><p>於是阿明每天早上五點起床，跟著媽媽到市場架棚子、擺水果、寫價錢牌。夜市的人看着這個小小的身影，都會多買一點。</p><p></p><p>老伯的年輕人依然在，但出差去了，只派了一位夥計來。夥計每次都會多給阿明一顆芒果，說：「陳伯交代的。」</p><p></p><p>星期三，老伯突然出現了。</p><p></p><p>「來看你的。」老伯說。</p><p></p><p>他那時候已經可以站著走一會兒了。樂樂陪著他，手裡拿著一個畫本。</p><p></p><p>「那是你送樂樂的畫本，」老伯說，「她每天都畫一張。」</p><p></p><p>樂樂打開畫本，裡面全是夜市、水果攤和一台舊收音機。</p><p></p><p>「謝謝你教我畫畫，」樂樂說。</p><p></p><p>阿明摸了摸她的頭。</p><p></p><p>那天晚上，夜市結束，阿明把收音機帶到巷口七號。林姐聽了老歌，笑著說：「你變得很會安排時間。」</p><p></p><p>「沒有，我只是不想讓大家失望。」</p><p></p><p>林姐點點頭，拿出一個紙袋，交給阿明。</p><p></p><p>「這是給你媽媽的，」她說，「我自己烤的餅乾。告訴她，冬天要搭配熱茶。」</p><p></p><p>阿明把餅乾帶回家。媽媽聞到香味，愣了一下。</p><p></p><p>「這是誰烤的？」媽媽問。</p><p></p><p>阿明沒有說出林姐的名字，只是說：「巷口的老師。」</p><p></p><p>媽媽看著餅乾，沉默了很久。</p><p></p><p>「你還記得嗎？」媽媽說，「我還小的時候，巷口有一家麵包店，老闆總會在我放學後，給我一片剛出爐的吐司。」</p><p></p><p>「為什麼不自己去跟林姐說謝謝？」阿明問。</p><p></p><p>媽媽笑了笑：「因為有些感謝，適合放在心裡。」</p><p></p><p>第二天，阿明回到巷口七號，把媽媽的話告訴林姐。</p><p></p><p>林姐聽了，什麼也沒有說，只是多烤了一包餅乾，讓阿明帶回家。</p><p></p><p>冬天很冷，但水果攤因為這些送來的小禮物，變得溫暖。</p><p></p><p>樂樂有時候會來陪阿明顧摊子，幫他記帳。林姐則在每個周末帶著新食譜來，請他們嚐試。</p><p></p><p>夜市的路燈在寒風中閃爍，但攤子之間的燈光，像一首無聲的歌。</p><p></p><p>阿明知道，就連冬天，也能有屬於自己的溫度。</p><p></p><p>只要有人願意伸出手，不管是烤一包餅乾，還是畫一張夜市。</p><p></p><p>那就足夠了。</p>`
  },
  12: {
    title: "春日的回信",
    body: `<p>冬天快結束的時候，樂樂的手機收到一個訊息。是陳伯在醫院拍的，說膝蓋裝了新關節，開始復健了。</p><p></p><p>「你看，」樂樂把照片給阿明看，「陳伯說他終於可以站起來了。」</p><p></p><p>阿明舉起手機，對著照片笑了。</p><p></p><p>「那你打算怎麼祝賀他？」林姐問。</p><p></p><p>阿明想了一下，把畫本翻了出來。他在〈傳承〉那幅畫下面，補了一行小字：「願你再次走過夜市。」</p><p></p><p>然後他把畫寄給了陳伯。</p><p></p><p>兩個禮拜後，夜市出現了一個熟悉的身影。陳伯柱著拐杖，一步一步走向水果攤。年輕人跟在後面，手裡推著一台可折疊的輪椅。</p><p></p><p>「陳伯！」阿明迎上去。</p><p></p><p>陳伯笑了：「 ternary market 老了，但夜市還年輕。」</p><p></p><p>他指著攤子上陳列的芭樂：「今天的，由我來挑。」</p><p></p><p>阿明愣了一下，隨即點頭。</p><p></p><p>陳伯仔細地挑了三顆最大最甜的芭樂，交給年輕人。年輕人付了錢，但沒有等找零就離開了。</p><p></p><p>「記住，」陳伯說，「夜市從來不是一個人的。」</p><p></p><p>阿明把這句話寫在當天晚上的日記裡。</p><p></p><p>春天來了的時候，媽媽說阿公可以回家住了。林姐送來一盆小向日葵，放在店門口。</p><p></p><p>「希望你們每天都看到太陽。」林姐說。</p><p></p><p>樂樂也送來一張畫，畫的是阿明在攤子後面畫畫的樣子。題目寫著：〈畫畫的人〉。</p><p></p><p>阿明把這張畫和媽媽的一張舊照片放在一起。舊照片裡，巷口麵包店的老板正把一片吐司遞給小時候的媽媽。</p><p></p><p>跨世代的故事，在同一面牆上對望。</p><p></p><p>他知道，這個春天不只帶來溫暖，還帶來了新一季的夜市。</p><p></p><p>燈會亮。歌會唱。畫會繼續。</p><p></p><p>只要有人願意站在那個角落，一切就會延續。</p><p></p><p>就像那首歌一樣：「音樂只要還有人聽，就不會消失。」</p><p></p><p>而夜市只要還有人選那三顆芭樂，就不會結束。</p>`
  },
  13: {
    title: "一排人",
    body: `<p>夏天又到了。</p><p></p><p>夜市的人越來越多，阿明的水果攤前面開始出現排隊的人潮。不是因為價格便宜，而是因為每個人都聽說過阿明和老伯的故事。</p><p></p><p>「排隊的都是來看你的，」媽媽笑著說。</p><p></p><p>阿明有點不好意思。</p><p></p><p>那天晚上，排隊隊伍裡有一對年輕人，手裡拿著婚紗照。女孩說：「我們想請你幫我們畫一幅畫，像夜市的那種感覺。」</p><p></p><p>阿明點點頭。他收攤後，跟著他們到一個小公園。公園的路燈下，男孩遞給女孩一支冰棒，像當年老伯遞給他一樣。</p><p></p><p>「畫我們在這個夜市相遇的那一刻，」女孩說。</p><p></p><p>阿明開始動筆。他把燈泡、水果攤、老伯的輪椅和那支冰棒都放了進去。畫的角落寫著：「在夜市，我們一起挑選了彼此。」</p><p></p><p>兩個禮拜後，年輕人寄來一張婚禮請柬，上面印著那幅畫。</p><p></p><p>阿明把請柬拿給林姐看，林姐說：「你看，你的畫已經不只是夜市了，它變成了別人的生活。」</p><p></p><p>阿明這才明白，傳承不只是選三顆芭樂。它可以是一幅畫、一首歌、一段記憶，然後變成一對新人相識的起點。</p><p></p><p>「那我們也要為夜市畫一幅新的，」林姐提議，「把從冬天到春天的故事全部放進去。」</p><p></p><p>「好啊。」阿明說。</p><p></p><p>於是，巷口七號的客廳變成了工作室。樂樂負責上色，林姐負責構圖，阿明負責主體。收音機裡播著那首老歌，阳光從窗簾透進來。</p><p></p><p>三個月後，畫完成了。阿明把它取名叫：〈一排人〉。</p><p></p><p>畫中央是一長串隊伍，從水果攤排到巷口，每個人手裡都拿著不同的東西：芭樂、冰棒、畫筆、收音機、餅乾、婚紗照……</p><p></p><p>在最遠處，老伯站在燈光下，手裡抱著樂樂畫的第一張畫。</p><p></p><p>林姐把這幅畫放大，掛在夜市入口的牆上。</p><p></p><p>從那天起，來夜市的人都會停在畫前，欣賞一會兒，然後買一顆阿明挑的芭樂。</p><p></p><p>夜市不再只是市場。</p><p></p><p>它變成了一個長長的請求，一次選擇，一排願意等待、願意被記住的人。</p>`
  },
  14: {
    title: "給媽媽的信",
    body: `<p>春天快結束的時候，阿明參加了一場作文比賽，題目是「我最想感謝的一個人」。</p><p></p><p>他寫了媽媽。寫了媽媽在雨天的等待，寫了媽媽總是把好吃的留給他，寫了媽媽在看到餅乾時眼神。</p><p></p><p>比賽那天，他把作文交給老師，老師看了一眼標題，又看了一眼內容，問他：「你確定要寫這個？」</p><p></p><p>阿明點點頭。</p><p></p><p>「很多人會寫老師、朋友，」老師說，「很少有人寫媽媽。」</p><p></p><p>阿明說：「因為媽媽才是我最想感謝的人。」</p><p></p><p>一個禮拜後，結果出來了。阿明得到了第一名。</p><p></p><p>他把獎狀帶回家，媽媽正在廚房裡煮湯。阿明把獎狀攤開，放在桌子上。</p><p></p><p>媽媽放下鍋鏟，靜靜地看著那張紙。</p><p></p><p>「你怎麼了？」阿明問。</p><p></p><p>媽媽的眼眶紅了：「我以為你永遠不會說謝謝。」</p><p></p><p>阿明楞了一下。他一直以為，感謝不需要說出口，只要把媽媽交代的事情做好就好。</p><p></p><p>「對不起，」阿明說著，眼淚也掉了下來。</p><p></p><p>媽媽走過去，把獎狀拿起來，掛在冰箱上。</p><p></p><p>「從今天開始，」媽媽說，「我們每天寫一張小紙條，寫一件今天感謝的事。不用多，只要一句。」</p><p></p><p>於是，那個夏天開始，媽媽和阿明每天晚飯後都會寫一張小紙條，放在同一個玻璃罐裡。</p><p></p><p>「謝謝今天的鳳梨甜。」</p><p>「謝謝你幫我轉播賽事。」</p><p>「謝謝林姐送來的餅乾。」</p><p></p><p>一個月後，罐子滿了。阿明把紙條倒出來，鋪在桌子上，一張一張看。</p><p></p><p>他驚覺，原來媽媽每天的生活，都有這麼多值得感謝的小事。</p><p></p><p>而他自己，居然從來沒有細細想過。</p><p></p><p>「媽媽，」阿明說，「從明天開始，我也幫你挑三顆芭樂。」</p><p></p><p>媽媽點點頭，笑了。</p><p></p><p>那一年的夏天，夜市比往年更熱鬧。因為那裡不僅賣水果，還賣感謝，賣溫暖，賣一張張紙條，一行行字。</p><p></p><p>阿明知道，這一切的開始，都是因為那場雨，那把紅傘，和一個願意在巷口等他的媽媽。</p><p></p><p>他看著玻璃罐，輕輕地拍了拍：「謝謝你，媽媽。」</p>`
  },
  15: {
    title: "最後一層架子",
    body: `<p>夏天結束前的一個午後，媽媽把攤子收了，對阿明說：「今天我們早點走。」</p><p></p><p>阿明問：「去哪？」</p><p></p><p>媽媽笑著說：「去巷口七號。」</p><p></p><p>阿明跟著媽媽走到那棟熟悉的公寓，推開鐵門。林姐和樂樂已經在等了，桌上擺滿了畫筆、顏料和餅乾。</p><p></p><p>「今天是什麼日子？」阿明問。</p><p></p><p>「我們的畫展，」林姐說，「今天正式開幕。」</p><p></p><p>阿明這才想起，〈一排人〉已經掛在夜市入口一個月了。今天，他們要在巷口七號舉辦一個小型的展覽，只邀請了夜市的朋友和幾位老街坊。</p><p></p><p>陳伯也來了。他走得還不太穩，但坚持要來。</p><p></p><p>「今天的主角是你，」陳伯指著阿明說。</p><p></p><p>展覽很簡單，卻很動人。牆上掛著阿明從 ch1 到 ch14 的所有畫，每一幅下面都寫著一段話。媽媽的作文獎狀也被陳列在角落，貼著一張小紙條，上面寫著：「謝謝媽媽。」</p><p></p><p>樂樂朗誦她的畫作，林姐彈吉他，陳伯哼著老歌。媽媽坐在一旁，靜靜地喝茶，什麼也沒有說。</p><p></p><p>那晚的最後，阿明站在〈一排人〉前面，對所有人說：</p><p></p><p>「我小時候以為，夜市只是賣東西的地方。後來才知道，它是一個選的地方——選芭樂、選朋友、選回憶。而每一個選擇，都會影響另一個人。」</p><p></p><p>「謝謝陳伯選了我，謝謝媽媽選了我，謝謝林姐選了我。」</p><p></p><p>他轉向林姐：「我有一個請求——我想繼續畫下去，寫下去，把這個故事延續到更多人面前。你們願意一起嗎？」</p><p></p><p>林姐點點頭，樂樂举高手，陳伯微笑。</p><p></p><p>媽媽只說了一句：「只要你不忘記為什麼開始就好。」</p><p></p><p>阿明緊緊握住媽媽的手。</p><p></p><p>那晚，夜市裡的燈比往常更亮。路燈把每個人的影子拉得很長，但影子之間都靠得很近。</p><p></p><p>夜市結束後的安靜時刻，阿明坐在攤子後面，抬頭看星星。</p><p></p><p>他知道，這個故事不會結束。</p><p></p><p>因為夜市還在，燈還在，芭樂還在，人還在。</p><p></p><p>他拿起畫筆，在新一頁寫下：「ch15，為了那些還在等待被挑選的人。」</p><p></p><p>紙的最後一行：</p><p></p><p>「我們都在夜市裡，尋找屬於自己的那三顆芭樂。」</p><p></p><p>而這，就是《屈民天地》第一章的結束。</p><p></p><p>也是第二卷的開始。</p>`
  },
  16: {
    title: "夕陽市場",
    body: `<p>ch15 的畫展之後，夜市的人越來越多。</p><p></p><p>不是因為畫而來的，而是因為一個傳聞：這裡賣的不只是水果，還有一種「被挑中的感覺」。</p><p></p><p>阿明每天依舊下午五點半開攤。他還是像以前一樣挑選最好的芭樂、芒果和鳳梨。但現在他會多問客人一句：「今天想找甜的，還是酸的？」</p><p></p><p>媽媽笑著說：「你變得很會說話。」</p><p></p><p>阿明笑笑。他知道不是自己變了，而是整個夜市都變了。</p><p></p><p>某天傍晚，夕陽把整個市場染成金黃色。阿明抬頭看見陳伯柱著拐杖，一步一步朝這裡走來。年輕人跟在後面，手裡拿著一把折疊椅。</p><p></p><p>「今天不輪班了？」阿明問。</p><p></p><p>陳伯點點頭：「今天我自己來。」</p><p></p><p>他站在攤子前，仔細看了很久。然後指了指最大的那顆芭樂：「就這個。」</p><p></p><p>年輕人付了錢。陳伯接過袋子，從口袋裡掏出十塊錢，放在桌子上。</p><p></p><p>「今天的，由我來選。」陳伯說。</p><p></p><p>阿明點點頭。</p><p></p><p>他知道這句話的意義。它代表陳伯回來了，代表夜市恢復了從前的節奏，代表選那三顆芭樂的傳統，又回到了原點。</p><p></p><p>那天晚上，阿明把這件事寫在畫本的最後一頁。「夕陽市場」的標題下面，畫了三個身影：媽媽、陳伯、他自己。</p><p></p><p>林姐看了之後說：「這才是真正的市場——不是因為人多，而是因為有故事的人，都在。」</p><p></p><p>阿明點點頭。</p><p></p><p>從那天起，夜市正式恢復了「每星期三，由陳伯挑選」的傳統。只是現在，阿明會在挑選之前，先問陳伯今天想要什麼口感的。</p><p></p><p>有時候甜的，有時候酸的，有時候只是想懷念一下。</p><p></p><p>「市場就像人生，」陳伯說，「不一定每天都選甜的。但你知道，只要願意選，就一定會有好结果。」</p><p></p><p>夕陽再次降臨時，阿明把最後一幅畫掛在攤子旁邊。畫的題目是：「夕陽市場」。</p><p></p><p>他知道，這不是結束。</p><p></p><p>這只是又一個夏天，又一個開始。</p><p></p><p>夜市的路燈還亮著。音樂還在歌。芭樂還在。</p><p></p><p>而故事，永遠繼續。</p>`
  }
};
let currentChapter = 1;
function renderChapter(n){
  const ch = chapters[n];
  if (!ch) return;
  currentChapter = n;
  document.getElementById('chapterContent').innerHTML = `<div class="chapter-num">第${['','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六'][n]}章</div><h1 class="chapter-title">${ch.title}</h1><div class="chapter-body">${ch.body}</div>`;
  const prev = n > 1 ? `<a href="#" data-ch="${n-1}">← 上一章</a>` : '';
  const next = n < Object.keys(chapters).length ? `<a href="#" data-ch="${n+1}">下一章 →</a>` : '';
  const navHtml = prev + next;
  document.getElementById('chapterNav').innerHTML = navHtml || '<span></span>';
  const links = document.querySelectorAll('#chapterNav a[data-ch]');
  if (links.length) bindNav();
  window.scrollTo({top:0, behavior:'smooth'});

function bindNav(){
