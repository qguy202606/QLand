  .home-link{

<body>
<header class="site-header">
  <div class="header-inner">
    <a class="back-link" href="/QLand/" style="color:#5a4638;text-decoration:none;font-size:15px;letter-spacing:2px">回首頁</a>
    <div class="title-block">
      <h1 class="site-title">小民天地</h1>
      <p class="site-subtitle">市井系列 · Ordinary Lives</p>
      <p class="site-tagline">巷口的燈、豆花的香、貓咪的早班。</p>
      <p class="site-desc">QLand 生活隨筆，每一章都是一個不用加班的日子。</p>
    </div>
    <div class="header-right">
      <div class="logo-circle">
        <svg width="52" height="52" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="12" y="28" width="40" height="24" rx="2" fill="#6e4fa8"/>
          <rect x="18" y="18" width="28" height="22" rx="2" fill="#6e4fa8"/>
          <polygon points="22,18 26,5 30,18" fill="#c03570"/>
          <polygon points="30,18 34,2 38,18" fill="#c03570"/>
          <polygon points="36,18 40,5 44,18" fill="#c03570"/>
          <rect x="27" y="40" width="10" height="12" rx="1" fill="#f3e9d2"/>
          <rect x="20" y="44" width="8" height="8" rx="1" fill="#e6dcc4"/>
          <rect x="36" y="44" width="8" height="8" rx="1" fill="#e6dcc4"/>
        </svg>
      </div>

    </div>
  </div>
</header>

<div class="container">
  <div id="chapterContent"></div>
  <div class="chapter-nav" id="chapterNav"></div>
</div>

<footer class="site-footer">
  <div class="footer-text">小民天地 · Ordinary Lives</div>
</footer>
<script>
const chapters = {
  1: {
    title: "早市的燈",
    body: `<p>巷口的早市五點就開了。</p><p>阿婆的豆花攤總是一盞燈亮。她沒聽過什麼創業故事，只知道每天凌晨三點起，把黃豆倒進石磨，來回推三百圈，做出一鍋能賣到中午的豆花。</p><p>「阿婆，爲什麼不買機器？」附近的中學生路過，總這樣問。</p><p>阿婆擦著手，笑著說：「機器轉得快，可是我一個人推不動。人老了，只能慢慢來。」</p><p>她的小攤沒有招牌，沒有名字，連qr code都是兒子上週強制貼上的。來的人卻都知道：這碗豆花，鹹的比甜的好吃。</p><p>老陳是對面理髮廳的師傅，每天固定買一碗甜的。</p><p>「阿婆，你今天豆花比較嫩。」</p><p>「你昨天就說比較老。」</p><p>「所以我天天說啊。」</p><p>阿婆搖頭，還是多給他一勺花生。</p><p>巷口養著一隻三花貓。沒人知道是誰養的，只知道豆花攤開張，牠一定準時蹲在板凳上，盯著筷子。</p><p>「小花，你也很愛吃甜的？」阿婆問。</p><p>貓咪眨眼。</p><p>賣菜的林伯騎三輪車進巷，總愛按兩下喇叭，嚇得小花跳上屋頂。阿婆卻只顧著把豆腐搬到攤上。</p><p>「今天行情不錯？」林伯邊卸菜邊說。</p><p>「什麼行情？」</p><p>「你沒漲價。」</p><p>阿婆笑，塞了一塊豆腐給小花。貓咪叼著豆腐，消失在清晨的霧裏。</p><p>──</p><p>這個城市很急。每個人都在跑，趕捷運，趕打卡，趕deadline，趕一場又一場別人定的比賽。</p><p>但巷口的早市不趕。它只等一盞燈亮，等一碗豆花，等一隻貓咪跳上板凳。</p><p>有天阿婆提早收了攤，坐在板凳上望著巷口，忽然說：「雖然很慢，可是我一個人，也走到了今天。」</p><p>──</p><p>生活不是故事。</p><p>生活是最後一章。</p>`
  },
  2: {
    title: "便利商店的對面",
    body: `<p>便利商店的燈光是這條巷子裏唯一不會睡的顏色。</p><p>小偉在對面停車場當夜班守衛，十四個月了。他的工作是看著夜班人把車停好，不讓人偷東西，偶爾幫喝醉的人找回手機。薪水不高，但他說很適合他。</p><p>「爲什麼？」朋友問。</p><p>「因爲晚上比較安靜。」小偉說，「而且我可以同時看書。」</p><p>他的守衛室只有一張桌子、一把折疊椅、一台老舊的熱水器，還有一盞別人不要的檯燈。燈光是黃的，他說黃光比較護眼。</p><p>每天晚上十點到清晨六點，他的生活幾乎是固定的：</p><p>十點半：泡一杯咖啡，坐下來讀書。</p><p>十一點半：巡一次停車場，和老闆的貓打招呼。</p><p>凌晨一點：上次廁所，順便看便利商店的貨架有没有新零食。</p><p>凌晨兩點：回去讀書，或者寫點東西。</p><p>便利商店的夜班是一個叫阿美的女生。她做了三年，說從來沒有看過同一張臉連續三天出現。</p><p>「你是例外。」她說。</p><p>小偉笑：「因爲我住在對面。」</p><p>阿美總會留一個熱便當給他。有時候是滷肉飯，有時候是咖哩，偶爾是前一晚賣剩下的關東煮。她說反正到最後都要丟，不如給看得見的人吃。</p><p>「你不怕我是壞人嗎？」小偉有一次問。</p><p>阿美拉下簾子，指了指外面馬路。</p><p>「壞人不會每天早上騎腳踏車來還你丟在桌上的原子筆。」</p><p>小偉楞了一下，才想起那是兩周前的事了。</p><p>那是巷口的故事。不是愛情，也沒有什麼戲劇性的轉折。只是兩個在深夜裏勉強醒著的人，剛好看見對方而已。</p><p>──</p><p>便利商店的燈每天早上六點關。</p><p>小偉這時會站起來，活動筋骨，把守衛室的椅子推回桌子底下。</p><p>阿美從玻璃門裏對他點點頭。他也點點頭。</p><p>然後他騎著腳踏車去早餐店買兩個饅頭，回家睡覺。</p><p>就這樣十四個月。</p><p>他說這樣很好。</p>`
  }
};
let currentChapter = 1;
function renderChapter(n){
  const ch = chapters[n];
  if (!ch) return;
  currentChapter = n;
  document.getElementById('chapterContent').innerHTML = `<div class="chapter-num">第${['','一','二','三','四','五','六','七','八'][n]}章</div><h1 class="chapter-title">${ch.title}</h1><div class="chapter-body">${ch.body}</div>`;
  const prev = n > 1 ? `<a href="#" data-ch="${n-1}">← 上一章</a>` : '';
  const next = n < Object.keys(chapters).length ? `<a href="#" data-ch="${n+1}">下一章 →</a>` : '';
  const navHtml = prev + next;
  document.getElementById('chapterNav').innerHTML = navHtml || '<span></span>';
  const links = document.querySelectorAll('#chapterNav a[data-ch]');
  if (links.length) bindNav();
  window.scrollTo({top:0, behavior:'smooth'});
}
function bindNav(){
  document.querySelectorAll('#chapterNav a[data-ch]').forEach(a=>{
    a.addEventListener('click', e=>{
      e.preventDefault();
      renderChapter(parseInt(a.dataset.ch));
    });
  });
}
renderChapter(1);
</script>
</body>
</html>
