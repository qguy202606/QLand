  .header-inner{

  .back-link:hover{opacity:.65}
  .title-group{

  .site-title{

<body>
<header class="site-header">
  <div class="header-inner">
    <a class="back-link" href="/QLand/">← 故事目錄</a>

</header>

<div class="container">

</div>

<footer class="site-footer">
  <div class="footer-text">QLand — 繁體中文小說平台</div>
</footer>
<script>
const chapters = {
  1: {
    title: "早市的燈",
    body: `<p>【小民天地 · 第一卷：巷口】</p><p>第一章 早市的燈</p><p>巷口的早市五點就開了。</p><p>阿婆的豆花攤總是第一個亮燈。她一輩子沒聽過「創業」這兩個字，只知道每天凌晨三點起床，把泡好的黃豆一顆顆倒進石磨裏，推它轉三百圈，做出一鍋能賣到中午的豆花。</p><p>「阿婆，爲什麼不買個機器？」附近的中學生路過，常這樣問。</p><p>阿婆擦著手，笑紋擠在眼角：</p><p>「機器轉得快，可是我一個人推不動。人老了，只能慢慢來。」</p><p>她的小攤沒有名字，沒有招牌，連二维码都是兒子上週強制貼上的。可是來的人都知道：這碗豆花，鹹的比甜的好吃。</p><p>老陳是對面理髮廳的師傅，每天固定買一碗甜的。</p><p>「阿婆，你今天豆花比較嫩。」</p><p>「你昨天就說比較老。」</p><p>「所以我天天說啊。」</p><p>阿婆搖頭，還是多給他一勺花生。</p><p>巷口養著一隻三花貓。沒人知道是誰養的，只知道每到豆花攤開張，牠一定準時出現，蹲在板凳上，盯著阿婆的筷子。</p><p>「小花，你也是很愛吃甜的？」阿婆問。</p><p>貓咪眨眼。</p><p>賣菜的林伯騎三輪車進巷時，總會按兩下喇叭，嚇得小花跳上屋頂。但阿婆不怕，她只顧著把豆腐搬到攤上。</p><p>「阿婆，今天行情不錯。」林伯邊卸菜邊說。</p><p>「什麼行情？」</p><p>「你沒涨价。」</p><p>阿婆笑，把一塊豆腐塞給小花。</p><p>貓咪叼著豆腐，消失在清晨的霧裏。</p><p>──</p><p>這個城市很急。每個人都在跑，趕捷運，趕打卡，趕 Deadline，趕一場又一場別人定的比賽。</p><p>但巷口的早市不趕。</p><p>它只等一盞燈亮，等一碗豆花，等一隻貓咪跳上板凳。</p><p>等你願意慢下來，聽阿婆說一句：</p><p>「雖然很慢，可是我一個人，也走到了今天。」</p><p>──</p><p>生活不是故事。</p><p>生活是最後一章。</p>`
  },
  2: {
    title: "便利商店的對面",
    body: `<p>【屈民天地 · 第一卷：巷口】</p><p>第二章 便利商店的對面</p><p>便利商店的燈光是這條巷子裏唯一不會睡的顏色。</p><p>小偉在對面停車場當夜班守衛，十四個月了。他的工作是看著夜班人把車停好，不讓人偷東西，偶爾幫喝醉的人找回手機。薪水不高，但他說很適合他。</p><p>「爲什麼？」朋友問。</p><p>「因爲晚上比較安靜。」小偉說，「而且我可以同時看書。」</p><p>他的守衛室只有一張桌子、一把摺疊椅、一台老舊的熱水器，還有一盞別人不要的檯燈。燈光是黃的，他說黃光比較護眼。</p><p>每天晚上十點到清晨六點，他的生活几乎是固定的：</p><p>十點半：泡一杯咖啡，坐下來讀第三章。</p><p>十一點半：巡一次停車場，和老闆的貓打招呼。</p><p>凌晨一點：上次廁所，顺便看便利商店的貨架有没有新零食。</p><p>凌晨兩點：回去讀書，或者寫點東西。</p><p>便利商店的夜班是一個叫阿美的女生。她做了三年，說從來沒有看過同一張臉連續三天出現。</p><p>「你是例外。」她說。</p><p>小偉笑：「因爲我住在對面。」</p><p>阿美總會留一個熱便當給他。有時候是滷肉飯，有時候是咖哩，偶爾是前一晚賣剩下的關東煮。她說反正到最后都要丢，不如給看得見的人吃。</p><p>「你不怕我是壞人嗎？」小偉有一次問。</p><p>阿美拉下統夜班的簾子，指了指外面馬路。</p><p>「壞人不會每天早上騎腳踏車來還你丢在桌上的原子筆。」</p><p>小偉楞了一下，才想起那是两周前的事了。</p><p>那是巷口的故事。</p><p>不是愛情，也沒有什麼戲劇性的轉折。</p><p>只是兩個在深夜裏勉強醒著的人，剛好看見對方而已。</p><p>──</p><p>便利商店的灯每天早上六點關。</p><p>小偉這時候會站起來，活動筋骨，把守衛室的椅子推回桌子底下。</p><p>阿美從玻璃門裏對他點點頭。</p><p>他點點頭。</p><p>然後他騎著腳踏車去早餐店買兩個饅頭，回家睡覺。</p><p>就這樣，十四個月。</p><p>他說這樣很好。</p>`
  },
  3: {
    title: "早餐店的板凳",
    body: `<p>早餐店在巷口轉角。老闆姓陳，大家都叫他陳伯。</p><p>陳伯五點整開門，五點十分油鍋熱，五點十五分第一批蛋餅出爐。四十年了，從沒遲到過。隔壁便利商店的阿雄說：「陳伯，你都不用鬧鐘的嗎？」</p><p>陳伯笑：「鬧鐘是給懶人用的。我每天四點半自然醒。」</p><p>阿雄不信，直到有一晚輪值加班到凌晨三點，路過早餐店，看見陳伯一個人坐在店裡剝蒜。</p><p>「怎麼這麽早？」阿雄敲敲玻璃門。</p><p>「蒜要現剝才香。」陳伯抬頭笑。</p><p>早餐店只有五張板凳。從陳伯開店那天就在，坐得發亮，油漆磨得 幾乎 露出木頭。</p><p>來的人都很固定：</p><p>- 七點：國小老師買兩個招牌飯糰</p><p>- 七點二十：工地師傅點三碗鹹豆漿</p><p>- 八點：阿銘 銀行員，永遠坐在最左邊那張</p><p>阿銘 坐最左邊那張不是因為喜歡，是因為他每天早上七點五十分到，那張板凳從來沒有被占。</p><p>有一天八點零五分，阿銘 來到早餐店，發現最左邊的板凳坐了別人。</p><p>是一個穿著高中校服的女孩子，低著頭看課本，腳邊放著書包，手裡捧著一杯熱豆漿。</p><p>阿銘 猶豫了一下，坐在了右邊第二張。</p><p>陳伯把蛋餅端出來，看了 阿銘 一眼，又看了看那個女孩子，沒有說話。</p><p>就這樣過了一個禮拜。那個女孩子每天都在 阿銘 來之前占了最左邊的板凳。</p><p>第八天，阿銘 提早了五分鐘到。他坐在了最左邊的板凳上。</p><p>女孩子來的時候，愣了一下，然後坐在了他旁邊。</p><p>從那天起，他們每天早上七點五十分一起出現在早餐店。陳伯的蛋餅還是五點十五分出爐，阿雄還是三點下班路過剝蒜。</p><p>有時候青春不是轟轟烈烈的愛情，而是兩個陌生人在早餐店，因為同一張板凳，開始了彼此的早晨。</p><p>──</p><p>阿銘 說，他後來才知道那個女孩子是對面中學三年級的學生。她每天七點四十五分出發，之所以坐那張板凳，是因為那張凳子距離油鍋最近，早上不會太冷。</p><p>「那你為什麽後來不提早？」陳伯問。</p><p>阿銘 笑：「因為我想看看，她會不會主動坐過來。」</p><p>陳伯點頭，然後順手 往鍋子里打了第二顆蛋。</p>`
  }
};
let currentChapter = 1;
function renderChapter(n){
  const ch = chapters[n];
  if (!ch) return;
  currentChapter = n;
  document.getElementById('chapterContent').innerHTML = `<div class="chapter-num">第${['','一','二','三','四','五','六','七','八'][n]}章</div><h1 class="chapter-title">${ch.title}</h1><div class="chapter-body">${ch.body}</div>`;
  const prev = n > 1 ? `<a href="#" data-ch="${n-1}">← 上一章</a>` : '';
  const next = n < Object.keys(chapters).length ? `<a href="#" data-ch="${n+1}">下一章 →</a>` : '';
  const navHtml = prev + next;
  document.getElementById('chapterNav').innerHTML = navHtml || '<span></span>';
  const links = document.querySelectorAll('#chapterNav a[data-ch]');
  if (links.length) bindNav();
  window.scrollTo({top:0, behavior:'smooth'});
}
function bindNav(){
  document.querySelectorAll('#chapterNav a[data-ch]').forEach(a=>{
    a.addEventListener('click', e=>{
      e.preventDefault();
      renderChapter(parseInt(a.dataset.ch));
    });
  });
}
renderChapter(1);
</script>
</body>
</html>
