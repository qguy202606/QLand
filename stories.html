<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QLand 故事目錄</title>
<style>
  :root{--bg:#0f0d0a;--surface:#241e17;--paper:#faf5eb;--ink:#2a221c;--muted:#7a6e60;--accent:#e8c08a;--border:#5a4a38}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:#f5efe4;font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;line-height:1.95;min-height:100vh;display:flex;flex-direction:column}
  a{color:#f5efe4}
  header.site{background:linear-gradient(180deg,#f5ecda,#eadcbe);border-bottom:1px solid #dbcdb0;padding:22px 24px;position:sticky;top:0;z-index:10}
  .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:52px;height:52px;border-radius:14px;background:#f3ecd8;border:1.5px solid #b08d55;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .site-title{font-size:28px;font-weight:800;color:#2a1008;letter-spacing:5px}
  .site-sub{font-size:13px;color:#5a4638;letter-spacing:2px;margin-top:2px}
  .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{color:#2a1008;text-decoration:none;font-size:14px;letter-spacing:1px;border:1px solid #c8b896;border-radius:999px;padding:7px 14px;background:transparent}
  .btn:hover{background:#e8dbc2}
  main.container{max-width:1100px;margin:0 auto;padding:36px 24px 56px;width:100%;flex:1}
  .hero{margin-bottom:28px}
  .hero h1{font-size:22px;color:#f6e9d3;letter-spacing:3px}
  .story-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
  .story-card{background:#14110b;border:1px dashed #3b3124;border-radius:18px;padding:22px 18px;transition:transform .15s,border-color .15s}
  .story-card:hover{transform:translateY(-2px);border-color:#5a4a30}
  .story-card .series{font-size:12px;color:#d8cbb8;letter-spacing:2px;margin-bottom:8px}
  .story-card h2{font-size:20px;color:#f3ebd8;margin-bottom:8px;font-weight:700}
  .story-card p{font-size:14px;color:#d8cbb8;line-height:1.7}
  footer{background:#0c0a08;border-top:1px solid #1f1b16;padding:22px 20px;text-align:center;color:#d8cbb8;font-size:13px;letter-spacing:2px;margin-top:auto}
  @media(max-width:640px){.header-inner{flex-wrap:wrap}.header-actions{width:100%}.story-grid{grid-template-columns:1fr}}
</style>
<style>
:root{--paper:#f5efe4;--ink:#1c1711;--muted:#d8cbb8;--accent:#e8c08a;--border:#5a4a38}
body{background:#0a0806 !important;color:#f5efe4 !important}
p,li{color:#f5efe4 !important}
h1,h2,h3,h4,h5,h6{color:#faf4e4 !important}
a{color:#e8c08a !important}
small,.muted{color:#d8cbb8 !important}
</style>
</head>
<body>
<header class="site">
  <div class="header-inner">
    <div class="brand">
      <div class="logo">
        <svg aria-hidden="true" fill="none" height="40" viewbox="0 0 80 80" width="40" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#6e4fa8" height="28" rx="2" width="48" x="16" y="34"></rect>
          <rect fill="#6e4fa8" height="28" rx="2" width="36" x="24" y="20"></rect>
          <polygon fill="#c03570" points="28,20 34,3 40,20"></polygon>
          <polygon fill="#c03570" points="36,20 40,0 44,20"></polygon>
          <polygon fill="#c03570" points="42,20 48,3 54,20"></polygon>
          <rect fill="#f3e9d2" height="14" rx="2" width="16" x="32" y="48"></rect>
          <path d="M32 48 L40 41 L48 48 Z" fill="#f3e9d2"></path>
          <rect fill="#e6dcc4" height="10" rx="1" width="10" x="24" y="52"></rect>
          <rect fill="#e6dcc4" height="10" rx="1" width="10" x="50" y="52"></rect>
        </svg>
      </div>
      <div>
        <div class="site-title">QLand</div>
        <div class="site-sub">繁體中文小說平臺</div>
      </div>
    </div>
    <div class="header-actions">
      <a class="btn" href="/QLand/">← 首頁</a>
    </div>
  </div>
</header>
<main class="container">
  <div class="hero">
    <h1>故事目錄</h1>
  </div>
  <div class="story-grid">
    <a class="story-card" href="palace.html">
      <div class="series">宮闈系列</div>
      <h2>錦繡後宮錄・宮闈年鑑</h2>
      <p>入宮、算計、鳳冠之路。從含芳殿的安靜 starters，到後宮最鋒利的玩家。</p>
    </a>
    <div>
      <div class="story-card" style="opacity:.6">
        <div class="series">戰爭系列</div>
        <h2>戰馬</h2>
        <p>老兵與馬的最後一程。</p>
      </div>
    </div>
    <div>
      <div class="story-card" style="opacity:.6">
        <div class="series">笑話系列</div>
        <h2>百合</h2>
        <p>御膳房裡最危險的菜，不是毒藥，是那道叫「百合」的飯。</p>
      </div>
    </div>
    <div>
      <div class="story-card" style="opacity:.6">
        <div class="series">笑話系列</div>
        <h2>青蛙</h2>
        <p>嘲笑慢的人，最後總會聽見一句比慢更重的話。</p>
      </div>
    </div>
    <a class="story-card" href="stories/zero-bot/index.html">
      <div class="series">AI TRADER 系列</div>
      <h2>金權遊戲：零號倉</h2>
      <p>從 quantization 到自我 debug，一個 trader 的覺醒與背叛。繁體中文，每章一千字以上。</p>
    </a>
    <div>
      <div class="story-card" style="opacity:.6">
        <div class="series">生活隨筆</div>
        <h2>即將上線</h2>
        <p>更多故事，敬請期待。</p>
      </div>
    </div>
  </div>
</main>
<footer>
  <span>QLand — 繁體中文小說平台</span>
</footer>
</body>
</html>
