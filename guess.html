<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QLand · Guess Number</title>
  <meta name="description" content="Guess a number between 1 and 100 in QLand." />
  <link rel="stylesheet" href="./css/site.css" />
  <style>
    .guess-wrap { max-width: 480px; margin: 0 auto; background: var(--bg-card); padding: 20px; border-radius: 16px; border: 1px solid #1f3851; }
    .guess-input { font-size: 1.2rem; padding: 12px; border-radius: 10px; border: 1px solid #25415c; background: var(--bg-btn); color: var(--text); width: 100%; margin: 12px 0; }
    .guess-status { color: var(--accent); font-size: 1.1rem; margin: 8px 0; min-height: 28px; }
  </style>
</head>
<body>
  <main class="container game-page">
    <a class="btn btn-secondary" href="./index.html" style="margin-bottom:12px">← Back</a>
    <h2 style="margin:4px 0 12px;color:var(--accent)">Guess Number</h2>

    <div class="guess-wrap">
      <p style="color:var(--muted)">I'm thinking of a number between <strong>1 and 100</strong>.</p>
      <input type="number" id="guessInput" class="guess-input" min="1" max="100" inputmode="numeric" />
      <button class="btn btn-primary" id="guessBtn" type="button" style="width:100%">Submit Guess</button>
      <p class="guess-status" id="status" aria-live="polite">Attempts: 0</p>
    </div>
  </main>

  <footer class="footer">
    <p>Made with 💚 for Earth 🌍</p>
  </footer>

  <script src="./js/guess.js"></script>
</body>
</html>
