<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QLand · Snake</title>
  <meta name="description" content="Snake in QLand. Use arrow keys or touch controls." />
  <link rel="stylesheet" href="./css/site.css" />
</head>
<body>
  <main class="container game-page">
    <div class="game-toolbar">
      <a class="btn btn-secondary" href="./index.html">← Back</a>
      <span id="pauseText" aria-live="polite">Playing</span>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" aria-label="Snake game canvas"></canvas>
    </div>

    <p class="status" id="status" aria-live="polite">Score: 0</p>

    <div class="game-controls" style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
      <button class="btn btn-primary" id="restartBtn" type="button">Restart</button>
      <button class="btn btn-secondary" id="pauseBtn" type="button">Pause</button>
    </div>

    <div class="dpad" aria-label="Direction controls">
      <button class="dpad-up" id="btnUp" type="button" aria-label="Up">↑</button>
      <button class="dpad-left" id="btnLeft" type="button" aria-label="Left">←</button>
      <button class="dpad-right" id="btnRight" type="button" aria-label="Right">→</button>
      <button class="dpad-down" id="btnDown" type="button" aria-label="Down">↓</button>
    </div>
  </main>

  <footer class="footer">
    <p>Made with 💚 for Earth 🌍</p>
  </footer>

  <script src="./js/snake.js"></script>
</body>
</html>
