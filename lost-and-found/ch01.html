<script>
(function(){
  var body = [
    "There is a shop at the corner of Maple and 5th that does not have a name on the door. The window is dusty. The bell above the door jingles softly, though no one ever seems to pass by.",
    "Elara found it on a rainy Thursday evening. She was not looking for it. She was only trying to stay dry.",
    "Inside, the shop smelled of old books and wood polish. The shelves were crowded with ordinary things — teacups, pocket watches, faded photographs, letters with no envelopes. Everything looked as if it had been waiting for someone to notice it again.",
    "Behind the counter sat an old man. He wore a cardigan with a coffee stain on the left sleeve. He looked up when Elara entered. His eyes were calm, almost as if he had been expecting her.",
    "He smiled. Most people do.",
    "Elara wandered the aisles. She touched the spines of books that had no titles. She opened a music box that played no tune she recognized. On a middle shelf she found a small wooden bird, carved with rough but careful hands.",
    "How much? she asked.",
    "The old man glanced at the bird, then at her. He did not answer immediately. The bell jingled once, twice, then fell silent.",
    "That one is not for sale. But if you need it... you may take it. free.",
    "Elara stared at him. Why would you give it away?",
    "Because the bird was left here by someone who no longer needed it. And you are the first person in three years to notice it.",
    "She took the bird home. That night, she dreamed of a boy with paint on his fingers, carving while an older man watched. The boy was laughing. The older man was teaching. When she woke, the bird was on her nightstand, and she understood.",
    "It was a memory. Not hers. But she had been carrying it somehow.",
    "She returned the next week. The old man nodded as if he had expected her.",
    "Some things we lose are not ours to begin with, he said.",
    "She visited again the week after that. She brought tea. They sat on opposite sides of the counter and watched the rain trace paths down the dusty window.",
    "Does it ever close? Elara asked.",
    "Only when everyone who needs to find something has found it. He shook his head.",
    "A month later, a teenager came in, soaking wet. He searched every shelf wildly. I lost something, he said. I do not know what, but I have to find it.",
    "The old man pointed to the middle shelf where the bird had rested. Look again. Sometimes what we lose is not what we think it is.",
    "The teenager reached out and picked up a red marble, swirling with cream. I forgot this, he whispered. I forgot this existed.",
    "And that was when the Shop That Returns What You Lost revealed its rule. It did not return objects. It returned moments. It returned parts of people who had simply forgotten to carry them.",
    "Not all returns were gentle. Some opened doors that had been locked for years. Some broke hearts before they healed them.",
    "But Elara understood now. The shop was not a store. It was a mirror. And the old man behind the counter was not a shopkeeper. He was the Keeper.",
    "And she would be back."
  ];
  var elContent = document.getElementById('chapterContent');
  var elNav = document.getElementById('chapterNav');
  var html = '<div class="chapter-num">Chapter 1</div><h1 class="chapter-title">The Shop That Returns What You Lost</h1><div class="chapter-body">' + body.map(function(p){return '<p>' + p + '</p>';}).join('') + '</div>';
  elContent.innerHTML = html;
  elNav.innerHTML = '<span class="disabled">← Previous</span><a href="/QLand/lost-and-found.html">系列目錄</a>';
  window.scrollTo({top:0, behavior:'smooth'});
})();
</script>
