const chapters = {
  1: {
    title: "未寄出的明信片",
    body: `<p>車站前面的咖啡店，這條巷子轉進去第三間，掛著一塊歪歪斜斜的木招牌：「等待」。</p><p>字體是毛筆寫的，墨色已經淡了，邊角被蟲蛀出一些小洞。老闆是一個說話很慢的中年人，大家都叫他老徐。他每個禮拜一擦拭相機，每個禮拜五把窗邊那一張桌子的燈調亮一點。</p><p>沒有人知道他在等什麼。</p><p>直到那個雨天，一個戴著帽子的女人推門進來，渾身濕透，手裡握著一張泛黃的明信片。她的風衣肩膀全濕了，頭髮滴著水，卻不停下來擦。</p><p>「請問，」她的聲音有些啞，「這裡可以寫信嗎？」</p><p>老徐點了點頭，指了指角落的書桌。</p><p>女人坐了下來，握著筆，卻遲遲沒有寫下第一個字。她的眼睛望著窗外，雨把整條街都打朦朧了。</p><p>「你在等誰？」老徐端了一杯熱可可過去。</p><p>女人抬起頭，眼神顯得有些遙遠：「等一個很久沒有回信的人。」</p><p>老徐笑了：「那你來對地方了。這裡的店名就是等的意思。」</p><p>那天晚上，女人沒有寫完信就離開了，留下一張空白的明信片在桌上。老徐把它收進了抽屜，連同其他 thousands 張沒有人取走的明信片。</p><p>從那天起，每当下雨的時候，女人都會來。她不說話，只是坐下來，望著窗外的雨，偶爾在明信片上寫幾個字，然後又收回口袋。</p><p>漸漸地，咖啡店的人開始注意到這件事。</p><p>「那個女人到底是誰？」店裡的常客問。</p><p>老徐搖了搖頭：「我現在不確定，但我確定，她遲早會寫完那封信。」</p><p>一個月後的某個下午，女人終於寫完了最後一行字。她把明信片交給老徐，說：「請幫我寄出，地址已經在上面。」</p><p>老徐點了點頭。</p><p>當他把明信片放進郵筒的時候，他才發現，收件人居然是他自己。而地址，是他二十年前住過的那條巷子。</p><p>────────────────────</p><p>「那封信裡寫了什麼？」常客問。</p><p>老徐笑了笑：「寫了一張永遠不會送達的明信片。」「那你為什麼不寄？」「因為他已經在那裡了。」</p><p>────────────────────</p><p>那天晚上，咖啡店第一次把燈全部關了。因為有人終於等到了。</p>`
  },
  2: {
    title: "咖啡店的名字",
    body: `<p>老徐的店沒有招牌，只有一塊木頭，上面用毛筆寫了兩個字：等待。</p><p>字是他父親寫的。父親當年也是開咖啡店的，在另外一條街，同樣的匾額，同樣的六張桌子。後來父親生病，把店頂給了老徐，自己搬到南部去住。「店名不要改，」父親說，「總有人會在等的。」</p><p>老徐那時候年輕，不懂什麼叫「等」。他只知道每天清晨五點半開門，打掃，磨豆，烤可頌，等第一批客人進來。他心裡想著，只要店還開著，生意總會慢慢好起來。</p><p>日子一天一天過，他發現店裡開始出現一些固定的人。</p><p>一個是每周三來的老先生，坐最角落的位置，要一杯黑咖啡，看兩個小時的報紙，然後留下一枚硬幣在桌上，悄悄離開。「那是誰？」剛來打工的服務生問。老徐搖了搖頭：「不知道，但他從不拖欠。」</p><p>一個是每天早上一樣的上班族，坐窗邊的位置，點一杯拿鐵，把手提電腦放在桌上，卻從來沒有打開過。他只是坐十分鐘，喝一半，然後 leave。「他在等什麼？」服務生問。老徐搖了搖頭：「每個人都在等不同的東西。」</p><p>還有一個是下雨天一定會來的小女孩，轉學過來的，新學校還沒有朋友。她總是在放學後推開店門，點一杯熱巧克力，坐在角落畫畫。老徐從不收她的錢。「為什麼？」小女孩問。老徐笑了笑：「因為你讓這家店變得更安靜。」小女孩不懂，但還是天天來。</p><p>直到有一天，她再也沒有出現。</p><p>老徐等了兩個禮拜。窗邊的拿鐵涼了，角落的黑咖啡變淡了，門口的雨停了又下。他開始懷疑，是不是自己做錯了什麼，讓她不再來了。</p><p>第三個禮拜的星期三，老先生放了一張紙在桌上，上面寫著：「我女兒說她以前在這裡畫畫。她說老闆很好。謝謝。」</p><p>老徐把那張紙放進了抽屜。他沒想到，小女孩的故事，已經被別人記住了。</p><p>原來，等這個字的重量，從來不只在於時間的長短，而在於你看見了多少人的離開，卻仍然願意為他留一盞燈。</p><p>他才知道，原來「等」這個字，有兩種寫法。一種是等待別人來，一種是等待別人走。</p><p>但更多的時候，「等」是一種選擇。選擇相信，選擇留下，選擇讓這家店繼續亮著燈。就像父親說的那樣，總有人會在等的。</p>`
  },
  3: {
    title: "第三個客人",
    body: `<p>小女孩搬走之後，咖啡店安靜了兩個禮拜。</p><p>老徐還是每天清晨五點半開門，打掃，磨豆，烤可頌。唯一不同的是，角落的桌子和窗邊的座位，連續幾天都沒有任何人坐過。他開始懷疑，是不是這家店已經到了該關門的時候。</p><p>但他沒有關門。父親說過，總有人會在等的。</p><p>第三個客人來的那個晚上，下著傾盆大雨。</p><p>門被推開的時候，鈴鐺響得特別大。一個穿著灰色風衣的男人站在門口，手裡拿著一把濕透的雨傘，臉色蒼白。「請問……」男人的聲音有些啞，「這裡可以借紙筆嗎？」</p><p>老徐點了點頭，指了指櫃台旁邊的書桌。</p><p>男人坐了下來，從懷裡拿出一張照片，放在桌上。照片上是一個女人，站在咖啡店門口，微笑著。「這是我妻子，」男人說，「她最喜歡這家店。」</p><p>老徐靜靜地聽著。</p><p>「她去年過世了，」男人繼續說，「她以前最喜歡坐在窗邊的位置，喝一杯熱可可。她說，這裡的燈光很溫暖。」</p><p>老徐看了一眼窗邊的座位，座椅的布套還是十年前那套，米白色，現在已經有點泛黃了。他沒有說話，只是轉身從櫃子裡拿出一條乾淨的毛巾，遞給了男人。</p><p>「擦一下，」他說，「外面雨太大了。」</p><p>男人愣了一下，然後接過毛巾，低聲說了句謝謝。</p><p>「我上來台南出差，順便過來看看，」男人說，「她以前說過，如果有一天她不在了，要我代她來喝一杯。」</p><p>老徐轉身走進廚房，端出一杯熱可可，放在男人面前。杯子的溫度透過桌面傳來，像是一種久違的安慰。「這杯我請，」他說。</p><p>男人點了點頭，眼眶有些紅。「謝謝。」</p><p>那天晚上，男人沒有說太多話。他只是靜靜地坐著，望著窗外，偶爾低頭看看那張照片。雨打在玻璃上，留下一道又一道的水痕。</p><p>老徐沒有打擾他。他只是在櫃台後面靜靜地翻著帳本，耳朵卻一直聽著那邊的動靜。</p><p>雨停了的時候，男人站起身，把一杯錢留在桌上。「我還會再來的，」他說。</p><p>老徐點了點頭。</p><p>他知道，這個店不只是賣咖啡的地方。它是收集眼淚的地方，也是安放記憶的地方。每一張桌子，每一個座位，都有自己的故事。而他，只是那個願意傾聽的人。</p><p>那天晚上，老徐在關門前，把抽屜裡的那張空明信片拿出來，在背面寫了一句話：「如果你想她，就來這裡坐坐。」</p><p>他不知道這句話是寫給誰的，也不知道會不會有人看到。但他還是把明信片放在了門口的郵筒裡。</p><p>他想，也許遲早會有人需要這句話。</p>`
  },
  4: {
    title: "雨中的常客",
    body: `<p>ch3 的男人之後，咖啡店又恢復了平靜。</p><p>但老徐發現，店裡的明信片越來越多了。有些是女人留下的，有些是老先生留下的，有些甚至是不認識的人趁老徐不注意時塞進抽屜的。每一張明信片的背面，都沒有地址。他把它們分類放好，有的放左邊抽屜，有的放右邊抽屜，有的夾在相本裡。</p><p>老徐沒有把它們郵寄出去。他知道，這些信不是用來寄的，而是用來存的。每一張都是一段沒有說完的話，每一個字都是一個還不想放下的人。</p><p>第四個客人來的那個午後，沒有下雨，但空氣中彌漫著潮湿的氣息。</p><p>是一個穿著校服的女生，看起來像是高中生。她的頭髮濕濕的，手裡拿著一把折疊傘，肩上背著沉重的書包，手裡還緊握著一只鋼筆。</p><p>「請問……」女生的聲音很小，「這裡可以借個地方寫功課嗎？」</p><p>老徐點了點頭，指了指最裡面那張桌子。</p><p>女生坐了過去，把書包放在椅子上，從裡面拿出課本和筆記本。但寫了五分鐘，她停了下來，轉頭看著老徐。她的神色有些慌張，又有些猶豫。</p><p>「老闆，」她問，「你這兒怎麼這麼安靜？」</p><p>老徐笑了笑：「因為我喜歡安靜。」</p><p>女生點了點頭，又低下頭寫功課。可是不到一會兒，她又抬起了頭。「老闆，」她再次開口，「你有沒有聽過『未寄出的明信片』這個故事？」</p><p>老徐的手頓了一下。</p><p>「誰跟你說的？」他問。</p><p>女生指了指抽屜的方向：「一個阿姨，她每個星期三都會來，坐在那裡，寫一張明信片，然後放進你的抽屜。」</p><p>老徐沉默了。他從來沒有跟任何人說過這件事，就連服務生也不知道抽屜的秘密。</p><p>「那個阿姨說，」女生繼續說，「這裡的每一張明信片，都是一個未完成的約定。」</p><p>老徐靜靜地聽著。</p><p>「我來這裡，」女生說，「是因為我奶奶以前也是這家店的客人。她去年過世了，走之前跟我說，要是有一天我想她了，就來這家店坐坐。」</p><p>老徐突然明白了什麼。「你奶奶是？」他問。「她叫美惠，」女生說。</p><p>老徐點了點頭。他想起來了。那個總是帶著一本詩集，點一杯紅茶，卻從來沒有喝過的美惠。她每個禮拜六來，坐兩個小時，然後離開，留下一張十元紙鈔在桌上。</p><p>「她說過，這裡的老闆不會趕人，」女生說，「而且這裡的燈光很溫暖。」</p><p>老徐的眼眶有些濕潤。</p><p>這一次，他沒有端飲料過去。他只是靜靜地站在櫃台後面，看著女生寫功課。她寫得非常認真，眉頭時而緊皺，時而鬆開。</p><p>直到女生離開時，老徐才拿出一張明信片，寫下了一行字，放進了抽屜。</p><p>那是一句他父親說過的話：「有些人不需要地址，因為他們早已經在你心裡。」</p><p>他看著女生走出門口，雨水從傘邊滑落，像是一段終於結束的旋律。</p><p>咖啡店又恢復了安靜，但這次的安靜不一樣。它像是一個人終於張開雙臂，接住了什麼重要的東西。</p>`
  },
  5: {
    title: "第五張桌子",
    body: `<p>ch4 的女生之後，咖啡店出現了一個新的規矩：</p><p>每到星期六下午，總會有一個老人出現在店門口。他穿著整齊的西装，手裡握著一把拐杖，走路的速度很慢，但每一步都很穩。老徐第一次見到他時，老人問：「這裡還有窗邊的位置嗎？」</p><p>老徐點了點頭。</p><p>老人坐了下來，點了一杯紅茶。他喝得很慢，一口一口，像是在品嚐什麼珍贵的東西。他的手指微微顫抖，杯子裡的茶水晃出小小的漣漪。</p><p>「我妻子以前最喜歡坐在這裡，」老人說，「她說窗邊的光線最適合看書。」</p><p>老徐沒有說話，只是靜靜地聽著。</p><p>「她走了三年了，」老人繼續說，「我每個禮拜六都會過來，幫她點一杯她最喜歡的紅茶。服務生換了好几個，唯獨老徐還在。老徐沒有阻止他，也從來沒有多問一句。」</p><p>老徐看了一眼抽屜。裡面已經有上百張明信片了，每一張都帶著一個名字，一個故事，一段無法寄出的思念。「你知道嗎？」老人彷彿看出了老徐的心思，「我覺得她並沒有真的離開。她只是換了一種方式存在。」</p><p>「什麼意思？」老徐問。</p><p>老人笑了笑：「你看這家店。每一個位子，每一盞燈，每一杯咖啡，都是她曾經存在的痕跡。只要這些東西還在，她就沒有真正離開。」</p><p>老徐沉默了。他想起了父親說過的話：「總有人會在等的。」原來，等的不是一個人，而是一段記憶。</p><p>那天晚上，老人離開時，老徐送了他一張明信片。「這是什麼？」老人問。</p><p>「是一張空白的明信片，」老徐說，「你可以寫給她。我會幫你保管。」</p><p>老人接過明信片，點了點頭。</p><p>老人走了之後，老徐坐在窗邊那张桌子上，靜靜地想著這家店的過去。他想起了父親，想起了第一批客人，想起了那些曾經來過、離開、又回來的人們。</p><p>這裡的每一張桌子，都見證過眼淚、微笑、告别和重逢。而他，只是那個願意一直坐在這裡，幫這些人保管記憶的人。</p><p>第二天早上，老徐在抽屜裡發現了一張寫好的明信片。是老人留下的。</p><p>上面寫著：「親愛的，這裡的燈光還是那麼溫暖。我每個禮拜六都會來，就像你以前一樣。期待下一次見面。」</p><p>老徐把那張明信片放了回去，夾在一本詩集的某一頁。他知道，這一次，店裡又多了一個願意等待的人。</p><p>而那張空白的明信片，終於有了屬於自己的故事。</p>`
  },
  6: {
    title: "晨光",
    body: `<p>ch5 之後，咖啡店的人漸漸多了起来。</p><p>不是因為什麼特別的原因，只是因為人们開始聽說，這裡有一家不會打烊的店，有一個人會幫你保管那些不敢寄出去的信。老徐沒有特别做什麼改變。他还是每天清晨五點半開門，打掃，磨豆，烤可頌。唯一的不同是，他的抽屜裡已經装满了明信片。責任感變重了，但他並未感到疲憊。反而有一種說不出來的踏實。</p><p>有時候他會在打烊後一張一張翻閱。每一張都是一個故事，每一個故事都是一個等待。沒有人催他，也沒有人要求他一定要回覆。但是他知道，只要有人把明信片放進來，就代表這家店還活著。代表還有信任存在於這間屋子裡。</p><p>第六個客人來的那個早上，沒有下雨，阳光透過窗戶灑進店里，照亮了每一張桌子。木質的地板反射出溫暖的光，空氣中混合著咖啡豆和新烤麵包的香氣。這種味道，老徐聞了二十年，永遠不會厭倦。</p><p>是一個中年男人，穿著簡單的襯衫，手裡拿著一個舊相框。他推門進來的时候，鈴鐺響得特別輕。他的步伐很穩，但眼神中藏著一絲疲憊。「請問……」男人的聲音很温柔，「這裡可以幫我保護一樣東西嗎？」</p><p>老徐點了點頭。</p><p>男人把相框放在柜台上。照片裡是一個年輕女人，站在這家店的門口，笑得很大声。那笑容很熟悉，老徐覺得好像在記憶深處見過。「這是我妻子，」男人說，「她走了五年了。這張照片是我們最後一張合影。」</p><p>老徐靜靜地聽著。</p><p>「我每個禮拜天都會過來，」男人說，「點一杯她最喜歡的拿鐵，坐一個小時。然後離開。」他的聲音很平静，但老徐看到了他眼底的淚光。「我不是來買東西的，」男人說，「我是來憶她的。」</p><p>老徐點了點頭。他知道這種感觉。因為他自己也是這樣等父親的。只是父親搬去了南部，他還偶爾能打電話。而這個男人的妻子，卻再也回不來了。</p><p>「你不是第一個這樣的人，」他說。</p><p>男人笑了笑：「我知道。我注意到這裡的抽屜越來越滿了。」</p><p>老徐沉默了一會兒，然後轉身從抽屜裡拿出一張明信片，遞給了男人。「這是？」男人問。</p><p>「是一張空白的明信片，」老徐說，「你可以寫給她。我會幫你保管。」</p><p>男人接過了明信片，點了點頭。</p><p>那天下午，男人寫完信之後，把明信片交了回來。他的字很工整，每一個筆畫都很穩重。老徐接過明信片，看了看上面的字：「親愛的，今天阳光很好。我還是會每個禮拜天來這裡，就像你以前一樣。等著下一次一起喝拿鐵。」</p><p>老徐把明信片放進了抽屜，在最上面。他知道，這家店已經不再只是一個賣咖啡的地方了。</p><p>它成了一個中轉站——承接那些來不及說出口的話，安放那些放不下的記憶。而每一個來這裡的人，都帶著自己的故事，和一張空白明信片。</p><p>老徐看著阳光洒在木地板上，心裡想著：「也許，等的盡頭，不是遺憾，而是理解。」</p><p>那一天，咖啡店的招牌第一次被阳光照亮。那兩個大字——等待——看起來，好像真的被等到了什麼。</p><p>門外的街道上，孩子們的笑聲遠遠傳來。風鈴再次響起。窗外，城市的喧囂依舊，但這裡依然安靜、溫暖，像一個永遠不關閉的港灣。</p><p>而那些曾经被遺忘的記憶，從今天起，都有了歸宿。</p>`
  }
};
</script>




<script>
(function(){
  const raw = document.getElementById('chapters-js').textContent;
  window.chapters = (new Function('return ' + raw))().chapters;
  const cn = ['','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
  const elContent = document.getElementById('chapterContent');
  const elNav = document.getElementById('chapterNav');
  function render(n){
    const ch = chapters[n];
    if (!ch) return;
    elContent.innerHTML = '<div class="chapter-num">第' + cn[n] + '章</div><h1 class="chapter-title">' + ch.title + '</h1><div class="chapter-body">' + ch.body + '</div>';
    const prev = n > 1 ? '<a href="#" data-ch="' + (n-1) + '">← 上一章</a>' : '';
    const next = n < Object.keys(chapters).length ? '<a href="#" data-ch="' + (n+1) + '">下一章 →</a>' : '';
    elNav.innerHTML = prev + next || '<span></span>';
    var as = elNav.querySelectorAll('a[data-ch]');
    for (var i=0;i<as.length;i++) as[i].onclick = function(e){e.preventDefault(); render(+this.getAttribute('data-ch'));};
    window.scrollTo({top:0, behavior:'smooth'});
  }
  render(1);
})();
</script>
