const chapters = {
  1: {
    title: "未寄出的明信片",
    body: `<p>車站前面的咖啡店，掛著一塊歪歪斜斜的木招牌：「等待」。</p><p>店裡面只有六張桌子，老闆是一個說話很慢的中年人，大家都叫他老徐。他每個禮拜一擦拭相機，每個禮拜五把窗邊那一張桌子的燈調亮一點。</p><p>沒有人知道他在等什麼。</p><p>直到那個雨天，一個戴著帽子的女人推門進來，渾身濕透，手裡握著一張泛黃的明信片。</p><p>「請問，這裡可以寫信嗎？」她問。</p><p>老徐點了點頭，指了指角落的書桌。</p><p>女人坐了下來，握著筆，卻遲遲沒有寫下第一個字。</p><p>「你在等誰？」老徐端了一杯熱可可過去。</p><p>女人抬起頭，眼神顯得有些遙遠：「等一個很久沒有回信的人。」</p><p>老徐笑了：「那你來對地方了。這裡的店名，就是等的意思。」</p><p>那天晚上，女人沒有寫完信就離開了，留下一張空白的明信片在桌上。老徐把它收進了抽屜，連同其他 thousands 張沒有人取走的明信片。</p><p>從那天起，每当下雨的時候，女人都會來。她不說話，只是坐下來，望著窗外的雨，偶爾在明信片上寫幾個字，然後又收回口袋。</p><p>漸漸地，咖啡店的人開始注意到這件事。</p><p>「那個女人到底是誰？」店裡的常客問。</p><p>老徐搖了搖頭：「我現在不確定，但我確定，她遲早會寫完那封信。」</p><p>一個月後的某個下午，女人終於寫完了最後一行字。</p><p>她把明信片交給老徐，說：「請幫我寄出，地址已經在上面。」</p><p>老徐點了點頭。</p><p>當他把明信片放進郵筒的時候，他才發現，收件人居然是他自己。</p><p>而地址，是他二十年前住過的那條巷子。</p><p>────────────────────</p><p>「那封信裡寫了什麼？」常客問。</p><p>老徐笑了笑：「寫了一張永遠不會送達的明信片。」</p><p>「那你為什麼不寄？」</p><p>「因為他已經在那裡了。」</p><p>────────────────────</p><p>那天晚上，咖啡店第一次把燈全部關了。</p><p>因為有人終於等到了。</p>`
  },
  2: {
    title: "咖啡店的名字",
    body: `<p>老徐的店沒有招牌，只有一塊木頭，上面用毛筆寫了兩個字：等待。</p><p>字是他父親寫的。父親當年也是開咖啡店的，在另外一條街，同樣的匾額，同樣的六張桌子。後來父親生病，把店頂給了老徐，自己搬到南部去住。</p><p>「店名不要改，」父親說，「總有人會在等的。」</p><p>老徐那時候年輕，不懂什麼叫「等」。他只知道每天清晨五點半開門，打掃，磨豆，烤可頌，等第一批客人進來。</p><p>日子一天一天過，他發現店裡開始出現一些固定的人。</p><p>一個是每周三來的老先生，坐最角落的位置，要一杯黑咖啡，看兩個小時的報紙，然後留下一枚硬幣在桌上，悄悄離開。</p><p>「那是誰？」剛來打工的服務生問。</p><p>老徐搖了搖頭：「不知道，但他從不拖欠。」</p><p>一個是每天早上一樣的上班族，坐窗邊的位置，點一杯拿鐵，把手提電腦放在桌上，卻從來沒有打開過。他只是坐十分鐘，喝一半，然後Leave。</p><p>「他在等什麼？」服務生問。</p><p>老徐搖了搖頭：「每個人都在等不同的東西。」</p><p>還有一個是下雨天一定會來的小女孩，轉學過來的，新學校還沒有朋友。她總是在放學後推開店門，點一杯熱巧克力，坐在角落畫畫。</p><p>老徐從不收她的錢。</p><p>「為什麼？」小女孩問。</p><p>老徐笑了笑：「因為你讓這家店變得更安靜。」</p><p>小女孩不懂，但還是天天來。</p><p>直到有一天，她再也沒有出現。</p><p>老徐等了很久，等到窗邊的拿鐵涼了，等到角落的老先生只來了兩次，等到門口的雨停了。</p><p>他才知道，原來「等」這個字，有兩種寫法。</p><p>一種是等待別人來。</p><p>一種是等待別人走。</p>`
  },
  3: {
    title: "第三個客人",
    body: `<p>小女孩搬走之後，咖啡店安靜了兩個禮拜。</p><p>老徐還是每天清晨五點半開門，打掃，磨豆，烤可頌。但窗邊的上班族不再來了，角落的老先生只來了兩次，之後也消失了。</p><p>老徐沒有問。他知道，每一場離開都有自己的理由。</p><p>第三個客人來的那個晚上，下著傾盆大雨。</p><p>門被推開的時候，鈴鐺響得特別大。一個穿著灰色風衣的男人站在門口，手裡拿著一把濕透的雨傘，臉色蒼白。</p><p>「請問……」男人的聲音有些啞，「這裡可以借紙筆嗎？」</p><p>老徐點了點頭，指了指櫃台旁邊的書桌。</p><p>男人坐了下來，從懷裡拿出一張照片，放在桌上。照片上是一個女人，站在咖啡店門口，微笑著。</p><p>「這是我妻子，」男人說，「她最喜歡這家店。」</p><p>老徐靜靜地聽著。</p><p>「她去年過世了，」男人繼續說，「她以前最喜歡坐在窗邊的位置，喝一杯熱可可。她說，這裡的燈光很溫暖。」</p><p>老徐看了一眼窗邊的座位，座椅的布套還是十年前那套，米白色，現在已經有點泛黃了。</p><p>「我上來台南出差，順便過來看看，」男人說，「她以前說過，如果有一天她不在了，要我代她來喝一杯。」</p><p>老徐轉身走進廚房，端出一杯熱可可，放在男人面前。</p><p>「這杯我請，」他說。</p><p>男人點了點頭，眼眶有些紅。</p><p>「謝謝。」</p><p>那天晚上，男人沒有說太多話。他只是靜靜地坐著，望著窗外，偶爾低頭看看那張照片。</p><p>雨停了的時候，男人站起身，把一杯錢留在桌上。</p><p>「我還會再來的，」他說。</p><p>老徐點了點頭。</p><p>他知道，這個店不只是賣咖啡的地方。它是收集眼淚的地方，也是安放記憶的地方。</p><p>每一張桌子，每一個座位，都有自己的故事。</p><p>而他，只是那個願意傾聽的人。</p>`
  },
  4: {
    title: "雨中的常客",
    body: `<p>ch3 的男人之後，咖啡店又恢復了平靜。</p><p>但老徐發現，店裡的明信片越來越多了。有些是女人留下的，有些是老先生留下的，有些甚至是不認識的人趁老徐不注意時塞進抽屜的。</p><p>每一張明信片的背面，都沒有地址。</p><p>老徐沒有把它們郵寄出去。他知道，這些信不是用來寄的，而是用來存的。</p><p>第四個客人來的那個午後，沒有下雨，但空氣中彌漫著潮湿的氣息。</p><p>是一個穿著校服的女生，看起來像是高中生。她的頭髮濕濕的，手裡拿著一把折疊傘，走進來的時候，臉上的表情有些慌张。</p><p>「請問……」女生的聲音很小，「這裡可以借個地方寫功課嗎？」</p><p>老徐點了點頭，指了指最裡面那張桌子。</p><p>女生坐了過去，把書包放在椅子上，從裡面拿出課本和筆記本。但寫了五分鐘，她停了下來，轉頭看著老徐。</p><p>「老闆，」她問，「你這兒怎麼這麼安靜？」</p><p>老徐笑了笑：「因為我喜歡安靜。」</p><p>女生點了點頭，又低下頭寫功課。可是不到一會兒，她又抬起了頭。</p><p>「老闆，」她再次開口，「你有沒有聽過『未寄出的明信片』這個故事？」</p><p>老徐的手頓了一下。</p><p>「誰跟你說的？」他問。</p><p>女生指了指抽屜的方向：「一個阿姨，她每個星期三都會來，坐在那裡，寫一張明信片，然後放進你的抽屜。」</p><p>老徐沉默了。</p><p>他從來沒有跟任何人說過這件事。</p><p>「那個阿姨說，」女生繼續說，「這裡的每一張明信片，都是一個未完成的約定。」</p><p>老徐靜靜地聽著。</p><p>「我來這裡，」女生說，「是因為我奶奶以前也是這家店的客人。她去年過世了，走之前跟我說，要是有一天我想她了，就來這家店坐坐。」</p><p>老徐突然明白了什麼。</p><p>「你奶奶是？」他問。</p><p>「她叫美惠，」女生說。</p><p>老徐點了點頭。他想起來了。那個總是帶著一本詩集，點一杯紅茶，卻從來沒有喝過的美惠。她每個禮拜六來，坐兩個小時，然後離開，留下一張十元紙鈔在桌上。</p><p>「她說過，這裡的老闆不會趕人，」女生說，「而且這裡的燈光很溫暖。」</p><p>老徐的眼眶有些濕潤。</p><p>這一次，他沒有端飲料過去。他只是靜靜地站在櫃台後面，看著女生寫功課。</p><p>直到女生離開時，老徐才拿出一張明信片，寫下了一行字，放進了抽屜。</p><p>那是一句他父親說過的話：</p><p>「有些人不需要地址，因為他們早已經在你心裡。」</p>`
  },
  5: {
    title: "第五張桌子",
    body: `<p>ch4 的女生之後，咖啡店出現了一個新的規矩：</p><p>每到星期六下午，總會有一個老人出現在店門口。他穿著整齊的西装，手裡握著一把拐杖，走路的速度很慢，但每一步都很穩。</p><p>老徐第一次見到他時，老人問：「這裡還有窗邊的位置嗎？」</p><p>老徐點了點頭。</p><p>老人坐了下來，點了一杯紅茶。他喝得很慢，一口一口，像是在品嚐什麼珍贵的東西。</p><p>「我妻子以前最喜歡坐在這裡，」老人說，「她說窗邊的光線最適合看書。」</p><p>老徐沒有說話，只是靜靜地聽著。</p><p>「她走了三年了，」老人繼續說，「我每個禮拜六都會過來，幫她點一杯她最喜歡的紅茶。」</p><p>老徐看了一眼抽屜。裡面已經有上百張明信片了。</p><p>「你知道嗎？」老人彷彿看出了老徐的心思，「我覺得她並沒有真的離開。她只是換了一種方式存在。」</p><p>「什麼意思？」老徐問。</p><p>老人笑了笑：「你看這家店。每一個位子，每一盞燈，每一杯咖啡，都是她曾經存在的痕跡。只要這些東西還在，她就沒有真正離開。」</p><p>老徐沉默了。</p><p>他想起了父親說過的話：「總有人會在等的。」</p><p>原來，等的不是一個人，而是一段記憶。</p><p>那天晚上，老人離開時，老徐送了他一張明信片。</p><p>「這是什麼？」老人問。</p><p>「是一張空白的明信片，」老徐說，「你可以寫給她。」</p><p>老人接過明信片，點了點頭。</p><p>第二天早上，老徐在抽屜裡發現了一張寫好的明信片。是老人留下的。</p><p>上面寫著：</p><p>「親愛的，這裡的燈光還是那麼溫暖。我每個禮拜六都會來，就像你以前一樣。期待下一次見面。」</p><p>老徐把那張明信片放了回去。</p><p>他知道，這一次，店裡又多了一個願意等待的人。</p><p>而那張空白的明信片，終於有了屬於自己的故事。</p>`
  }
};
</script>
<script>
(function(){
  const raw = document.getElementById('chapters-js').textContent;
  window.chapters = (new Function('return ' + raw))().chapters;
  const cn = ['','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
  const elContent = document.getElementById('chapterContent');
  const elNav = document.getElementById('chapterNav');
  function render(n){
    const ch = chapters[n];
    if (!ch) return;
    elContent.innerHTML = '<div class="chapter-num">第' + cn[n] + '章</div><h1 class="chapter-title">' + ch.title + '</h1><div class="chapter-body">' + ch.body + '</div>';
    const prev = n > 1 ? '<a href="#" data-ch="' + (n-1) + '">← 上一章</a>' : '';
    const next = n < Object.keys(chapters).length ? '<a href="#" data-ch="' + (n+1) + '">下一章 →</a>' : '';
    elNav.innerHTML = prev + next || '<span></span>';
    var as = elNav.querySelectorAll('a[data-ch]');
    for (var i=0;i<as.length;i++) as[i].onclick = function(e){e.preventDefault(); render(+this.getAttribute('data-ch'));};
    window.scrollTo({top:0, behavior:'smooth'});
  }
  render(1);
})();
</script>
