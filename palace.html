  {
    key: 1,
    title: "宮門一閉，便是另一片天",
    body: `第一章<p>天色未亮，玄武門外還籠著一層薄霧。</p><p>露水沾在宮牆角的草尖上，夜巡的梟鉦敲了三更。除了冷露和青石板上的反光，什麼都沒有。</p><p>她跪在玄武門外，第一批宮燈剛滅。頭上還頂著紅木盤，盤裡放著入宮的冊子，名字寫得端端正正。</p><p>這不是她第一次進宮，卻是第一次以「宮婢」的身份站在這裡。</p><p>她不明白自己為什麼會在這裡。她沒有才華，沒有背景，沒有任何足以讓她站在皇宮內院的原因。唯一的不同，也許是那天禮部選拔時，皇后身邊的訓導姑姑多看了她一眼。</p><p>就因為那一眼，她的名字被記了下來。太監們給她換了新衣，教導姑姑多教了她三日規矩，最後把她分到了最偏遠的含芳殿。</p><p>含芳殿距離冷宮不到二百步，十年沒有人住過。夜裡常有奇怪的聲響從殿裡傳出，宮婢們都說那是舊主子的嘆息。</p><p>她不害怕。真正讓她心悸的，是那一眼之後的沉默——那種被選中卻沒有被真正接受的沉默，像是一道刻在皮膚上的印記，揮之不去。</p><p>含芳殿的規矩很鬆。管事姑姑說，這裡以前住過一位不受寵的嬪妃，死後就再沒人願來。所以殿前階梯上長了青苔，院裡的井多年沒有打過水，連掃地都只掃外殿，內殿從來不進。</p><p>她來的第三天，皇后宮裡來人賞了一筐荔枝。這是她進宮以來第一次見到賞賜，整個含芳殿的宮婢都圍了過來。</p><p>秋姑姑接過賞單，笑著說：「這是皇后娘娘的恩典，你們都要記住。」</p><p>她低下頭，心裡卻明白——這不是皇后的賞賜。</p><p>賞單上的字跡，不是皇后宮中掌事太監的手筆。賞單是假的。有人借著皇后的名義，在試探她的規矩。</p><p>她低下頭，沒有說破，只是安靜地站在那裡，像一塊沒有溫度的石頭。</p><p>入宮第一天，她沒有哭，也沒有覺得委屈。她只記得母親在城門口對她說的最後一句話：「宮裡像棋盤，每一步都有人在看著你。要活下去，先學會安靜。」</p><p>她把這句話壓進心裡，壓到和呼吸融在一起。直到此刻，看著玄武門緩緩闔上，她才真正體會到「安靜」兩個字有多重。</p><p>──</p><p>宮門一閉，便是與世隔絕。從此以後，她只能活在這座大院的高牆之內，活在一雙雙看不見的眼睛底下。</p><p>她知道，這裡沒有人會因為她年紀小而憐憫她。能在後宮活下來的，要麼是狠角色，要麼是安靜到無人注意的人。</p><p>而她，選擇了後者。</p>`

  {
    key: 2,
    title: "夜巡的腳步聲",
    body: `第二章<p>含芳殿的夜很長。</p><p>她沒有銀子買燈油，只能靠宮燈的余光讀書。太監們偶爾送來殘破的經卷，她一一補好，用紅線重新縫起頁邊。</p><p>宮裡人人都知道含芳殿住著一個不愛說話的丫頭。給她要麼點頭，要麼搖頭，從不多說一句。管事姑姑們說她「稳重」，她也只是笑笑。</p><p>第三夜的子時，她聽見窗外有腳步聲。</p><p>很輕，像貓，踩在石板路上幾乎沒有聲音。她放下書，把燈吹滅，整個人縮進被子裡，連呼吸都放轻。</p><p>腳步聲在窗前停了片刻，然後又繼續往前走。</p><p>她不敢睜開眼睛，直到確定那人已經走遠，才重新點亮燈火。</p><p>窗台上放著一張折好的紙，沒有署名。</p><p>她打開來看，上面只寫著四個字：「安靜點。」</p><p>她看了很久，然後把紙燒了。</p><p>第四夜，腳步聲又來了。這次她在窗台上放了一串珍珠，是入宮那天領的賞賜之一。她留下最醜的一顆，其余的全部放在窗沿。</p><p>腳步聲停了更久。</p><p>等她點燈的時候，發現珍珠不見了，取而代之的是一塊溫熱的桂花糕。</p><p>糕點上還有指印，像是有人特地带來的。</p><p>她沒有吃。她把桂花糕收了起來，放在梳妝盒最底層，當作一個秘密。</p><p>──</p><p>含芳殿的生活就這樣慢慢繼續。她依然每天早起，掃地，補書，吃飯，睡覺。唯一的不同，是窗台上偶爾會出現一些奇怪的小東西：一塊絲綢邊角料，一支沒有墨的毛筆，半塊乾燥的橘子皮。</p><p>她從不問是誰放的。她只是靜靜地收下，然後在夜裡一一翻看。</p><p>這就是她在後宮的生存方式：不吵鬧，不張揚，不主動。她像水一樣，流進宮殿的縫隙裡，不引起任何人的注意。</p><p>直到那一天，皇上路過了含芳殿。</p>`
  },
  {
    key: 3,
    title: "棋盤上的第一步",
    body: `第三章<p>皇上来含芳殿，是因為答應了太后。</p><p>太后前幾夜夢見了先皇，說含芳殿舊主生前最得寵，如今殿前冷清，實在可憐。太后醒來便派人去含芳殿查看，發現殿內供奉還擺著舊主的牌位。</p><p>於是太后下令，讓含芳殿重新供奉香火，並讓現任宮人每日打掃內殿。</p><p>這對含芳殿來說，是天大的變動。</p><p>管事姑姑們開始频繁出入，太監們送來新的供品，連內務府都派了前來修繕殿前的階梯。含芳殿從被人遺忘的角落，一夜之間變成了太后掛念的地方。</p><p>而這一切，都是因為她 - 那個不愛說話、卻意外被太后注意到的宮婢。</p><p>她站在殿門口，看著人來人往，心裡很清楚：這不是因為她個人，而是因為那座殿，那段往事，和太后的夢。</p><p>但無論如何，含芳殿不再被遺忘。</p><p>入夜後，她第一次走進了含芳殿的內殿。</p><p>內殿陳設簡陋，但處處乾淨。舊主的梳妝台還在，銅鏡上蒙著一層薄灰。她伸手擦了擦，鏡子裡的自己出現在眼前 - 一張沉默的臉，一雙沒有情緒的眼睛。</p><p>這就是她在後宮的生存狀態：像一面鏡子，映照著別人的生活，自己卻始終留在原地。</p><p>而在鏡子看不見的地方，棋盤已經開始移動。</p><p>她回到自己的房间，從枕頭下摸出一本小冊子。那是她入宮後偷偷記下的，記錄著每一個見過她的人，每一句說過的話，每一次賞賜的細節。</p><p>她翻到最新的一頁，寫下：「皇上路過含芳殿，太后夢見先皇。」</p><p>然後她在下面畫了一個小小的圆圈。</p><p>那是她棋盤上的第一步。</p>`
  },
  {
    key: 4,
    title: "未說完的午膳",
    body: `第四章<p>午膳時分，含芳殿第一次坐上了主桌。</p><p>以前她們都在偏殿用膳，今天卻被請到了正殿。掌膳太監親自布菜，席間還有兩位她不認識的嬪妃作陪。</p><p>氣氛很客氣，卻又暗藏機鋒。</p><p>左首的嬪妃姓李，是剛晉的貴人。她笑著說：「妹妹剛進宮，若有不懂的地方儘管問我。」</p><p>她低下頭，轻轻地回答：「多謝李姐姐教誨。」</p><p>右首的嬪妃姓王，看起來溫和，卻始終沒有說話。她只是細細地品著湯，偶爾抬起眼來看她一眼，那眼神讓她想起冬天結冰的湖面。</p><p>膳畢，李貴人拉著她的手說：「妹妹這幾天有空來我宮裡坐，我教你刺繡。」</p><p>她點點頭，目送兩位嬪妃離去。</p><p>掌膳太監收拾碗碟時，偷偷塞給她一張紙條。她趁人不注意打開來看，上面寫著：「小心王氏，她在試探你與含芳殿舊主的關係。」</p><p>她將紙條燒了。</p><p>那天晚上，她在筆記本上寫下：「午膳是第一次考驗。李貴人表面親切，王嬪妃暗藏算計。宮中每一步都是棋局。」</p><p>她寫完，把筆記本放回枕頭下。</p><p>窗外又傳來輕微的腳步聲。她沒有抬頭，只是靜靜地聽著，直到腳步聲遠去。</p><p>這是她在後宮生存的第四天。她已經學會了不說話，不顯露，不動聲色。她像一顆棋子，安靜地排在棋盤上，等待著有人來移動她。</p><p>而她相信，總有一天，輪到她來落子。</p>`
  },

    key: 5,
    title: "御花園的舊侍女",
    body: `第五章<p>她沒想到，自己會在御花園再次遇見那个旧侍女。</p><p>那天天氣很好。阳光穿過梧桐葉，灑在青石板上，像碎金一樣。</p><p>她帶著兩個小宫女去御花園採花，準備晚上宮宴用的擺飾。</p><p>转角处，她看見一個身影。</p><p>那是一個年紀很大的宫女，背有點駝，手裡拿著一把剪刀，正在修剪一株枯萎的牡丹。</p><p>「那是誰？」她問身邊的宫女。</p><p>「那是以前的李姑姑。」小宫女說，「以前在淑妃宮裡當差，後來淑妃失勢，她就被打發到花房來了。」</p><p>她點點頭，走了過去。</p><p>「李姑姑。」她輕聲叫道。</p><p>老宫女抬起頭，看了她一眼，又低下了頭。</p><p>「請問新來的貴人安。」她的声音很平，没有一丝波動。</p><p>「姑姑，這株牡丹還能救嗎？」她問。</p><p>李姑姑搖了搖頭：「救不了。根已經爛了。」</p><p>「那你為什麼還在剪？」</p><p>「因爲它開過。」李姑姑說，「既然開過，就應該好好結束。」</p><p>她愣了一下。</p><p>李姑姑放下剪刀，捧起那把枯萎的花，遞到面前。</p><p>「你看，花瓣還是紅的。」她說，「只是時間到了。」</p><p>她接過那把花，聞到了淡淡的香氣。</p><p>「姑姑，你以前見過很多花吧？」</p><p>李姑姑點點頭：「在這宮裡，四十一年了。我看過的花，比你看過的人都多。」</p><p>「那你最喜歡什麼花？」</p><p>李姑姑沉默了一會兒，說：「沒有最喜歡的。因爲在這裡，花開得再好，也只是別人的陪襯。」</p><p>她聽了，心裡微微一沉。</p><p>她迴想起自己剛剛進宮的時候，也是這樣想著。只是那時候的她，還不知道這座宮殿的殘酷。</p><p>「姑姑，你恨过這個地方吗？」</p><p>李姑姑搖了搖頭：「恨過。現在不恨了。」</p><p>「為什麼？」</p><p>「因爲我發現，這個地方不會因爲我恨它而改變。它只會因为我哭，而看不起我。」</p><p>她點點頭，把枯萎的牡丹放在了旁邊的石桌上。</p><p>「姑姑，你願意來我宮裡嗎？我身邊正缺一個人。」</p><p>李姑姑抬起頭，眼神裡有驚訝，也有猶豫。</p><p>「为什么？」</p><p>「因爲我需要一個人，告訴我這座花園裡，哪些花是真的，哪些只是影子。」</p><p>李姑姑看著她，看了很久。</p><p>「你跟你母親，很像。」她說。</p><p>她楞了一下。</p><p>「我母親？」</p><p>「嗯。她以前也問過我同樣的問題。」</p><p>李姑姑低下頭，繼續修剪那株牡丹。</p><p>「好。我跟你去。」</p><p>她點點頭，轉身帶著李姑姑離開了御花園。</p><p>陽光透过梧桐葉，照在她們的背上。</p><p>她忽然明白，這座宮殿裡，最危險的不是敵人，而是那些看盡了一切，卻依然選擇留下來的人。</p><p>因爲這些人，才真正懂得怎麽在這片泥濘中，開出一朵屬於自己的花。</p>`

let currentChapter = 1;
function renderChapter(n){
  const ch = chapters[n-1];
  if (!ch) return;
  currentChapter = n;
  document.getElementById('chapterContent').innerHTML = `<div class="chapter-num">第${['','一','二','三','四','五','六','七','八'][n]}章</div><h1 class="chapter-title">${ch.title}</h1><div class="chapter-body">${ch.body}</div>`;
  const prev = n > 1 ? `<a href="#" data-ch="${n-1}">← 上一章</a>` : '';
  const next = n < Object.keys(chapters).length ? `<a href="#" data-ch="${n+1}">下一章 →</a>` : '';
  const navHtml = prev + next;
  document.getElementById('chapterNav').innerHTML = navHtml || '<span></span>';
  const links = document.querySelectorAll('#chapterNav a[data-ch]');
  if (links.length) bindNav();
  window.scrollTo({top:0, behavior:'smooth'});
}
function bindNav(){
  document.querySelectorAll('#chapterNav a[data-ch]').forEach(a=>{
    a.addEventListener('click', e=>{
      e.preventDefault();
      renderChapter(parseInt(a.dataset.ch));
    });
  });
}
renderChapter(1);
</script>
