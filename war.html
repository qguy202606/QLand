  1: {
    title: "老馬認得血的味道",
    body: `<p>【戰馬】</p><p>老馬認得血的味道。</p><p>它不記得自己活了多少年，只記得背上換過三個主人。第一個是頭盔歪斜的新兵，騎著它衝進火陣，半程就摔了下來；第二個是沉默的斥候，夜裏摸過敵營，回來時馬肚帶上染了半邊黑血；第三個，就是現在這個。</p><p>現在這個沒有頭盔。他額頭上纏著髒布，手握的刀卷了口。身後十步，是燒剩的軍旗。更遠處，塵土後面傳來馬嘶。</p><p>老馬很累。它的左後腿中了箭，每踏一步都像踩在針上。但它不敢停——不是因爲忠誠，是因爲牠知道，這片戰場上停下的東西，統統都會被吃掉。</p><p>男人忽然抬手，指了指西邊的太陽。</p><p>「帶我去那裏。」</p><p>老馬側過頭看向西邊的太陽。太陽底下是懸崖。悬崖下面是河，河對岸是友軍的營帳。但中間隔著敵騎。</p><p>它沒有動。</p><p>男人笑了，翻身下馬，把最後半袋麥料塞進牠嘴裏。</p><p>「去吧。」</p><p>老馬嚼著麥料，轉身向來路跑起來。它不是逃，它去把追兵引開。</p><p>身後，那個沒有頭盔的男人，握住了卷口的刀。</p><p>──</p><p>三天後，河對岸的伙夫在灘頭發現了一具馬屍。左後腿有箭，肋骨斷了四根，但腹中的麥料還沒有消化完。</p><p>遠處山坡上，新來的騎兵問老軍官：「那馬爲什麼死在那？」</p><p>老軍官望著對岸的營帳，說道：「它完成了任務。」</p><p>──</p><p>殘酷的不是戰爭，是完成任務的，往往不會說話。</p>`

  2: {
    title: "老兵的信",
    body: `<p>戰爭結束三十年後，老兵阿貴還住在巷口那間小房子裏。</p><p>他的右腿不好，走路一拐一拐。每天清晨六點，他會提著一個鐵罐，走到巷口郵筒那裏，塞進一封信，然後慢條斯理地走回家。</p><p>沒有人知道那封信寫給誰。</p><p>直到有一天，小杰——巷口國中三年級的學生——放學路上看見阿貴蹲在郵筒旁邊，手裏拿著信封，發呆。</p><p>「阿伯，你每天都來寄信啊？」小杰問。</p><p>阿貴點點頭，把信投進郵筒。</p><p>「寫給誰？」</p><p>「一個老朋友。」阿貴微笑，「他住在很遠的地方。」</p><p>「爲什麼不寄電子郵件？」</p><p>阿貴看著小杰，像是看一個還不懂事的孩子。</p><p>「因爲他不會用電腦啊。」他說，「而且，手寫的信比較有溫度。」</p><p>那天之後，小杰每天都陪阿貴走到郵筒。有時候阿貴會跟他講以前的故事：戰場上的夜晚、戰壕裏的寒風、還有他那個總是把最後一口水讓給他的戰友。</p><p>「他叫阿明。」阿貴說，「我們一起當兵，一起上戰場，一起活下來。」</p><p>「那他現在在哪裏？」</p><p>「他在北方。」阿貴說，「每年這個時候，他都會收到我的信。」</p><p>小杰點點頭，沒有再問。</p><p>直到有一天，小杰放學路過郵筒，看見阿貴沒有來。</p><p>他問附近賣早餐的陳伯，陳伯搖搖頭，指著巷口那間小房子的方向。</p><p>「阿伯住院了。」陳伯說，「心臟方面的問題。」</p><p>小杰心裏一沉。</p><p>他回到家，打開抽屜，找出一張纸和一支筆，寫了這樣一封信：</p><p>---</p><p>阿明伯伯：</p><p>你好。我是巷口的小学生，每天陪阿貴伯寄信给您的那个小孩。</p><p>最近阿贵伯住院了，不能寄信。所以我替他寄这封信。</p><p>我不知道你们以前的故事，但阿贵伯说你们一起活了下来，还说您每次都会回他一封信。</p><p>我不知道您有没有回信，但我觉得，您一定也在等他。</p><p>请您一定要等他。</p><p>---</p><p>小杰把信投進郵筒，心裏默默想著。</p><p>三天後，阿贵伯出院回家。他第一件事就是走到郵筒，投了一封信。</p><p>隔天，小杰陪他去的時候，郵筒裏有一封回信。</p><p>收件人寫的是阿貴。筆跡很工整，但看得出寫信的人手在發抖。</p><p>阿貴拆開信，看了很久很久，最後流下眼淚。</p><p>信上只有一句話：</p><p>「阿貴，我回來了。」</p><p>小杰這才明白，阿明伯伯早就回來了。他每年收到的信，其實都是同一封——</p><p>阿貴每年寫一次，投進郵筒，然後自己再拿回來。</p><p>因爲他知道，阿明已經不在了。</p><p>他把信投進去的瞬間，其實是在跟自己的記憶告別。</p><p>每年一次。</p><p>---</p><p>巷口從此多了一個不成文的約定：每年這個季節，小杰都會陪阿貴伯走到郵筒，幫他投一封信。</p><p>然後兩個人一起回家。</p><p>什麼都沒說。</p><p>有時候，最深的友情，不需要回信。</p><p>只需要有人願意，每年的這個時候，陪你去郵筒那裏，投一封信。</p>`
  },
  3: {
    title: "壕溝的哨音",
    body: `<p>戰爭結束多年後，老兵阿山還保留著那枚銅哨子。</p><p>哨子很舊，邊緣磨得發亮。每次他拿起它，總會想起 壕溝裏的那一夜。</p><p>那時候他還是一個新兵，第一次上戰場。 壕溝很窄，泥巴混著血，空氣裏全是火藥味。</p><p>阿山不會用步槍，他只会吹哨子。</p><p>「哨子？」隊長問。</p><p>「對。」阿山說，「我以前在軍樂隊。」</p><p>隊長點點頭，把哨子塞給他：「那就用它。如果我們需要撤退，就吹三長聲。」</p><p>阿山點點頭。</p><p>那一夜，敵軍進攻。 壕溝被炸開一個缺口，敵人從缺口湧進來。</p><p>隊長中彈，倒在他面前。</p><p>「吹哨。」隊長說。</p><p>阿山拿起哨子，吹了三長聲。</p><p>聲音在壕溝裏迴盪。遠處的援軍聽見了，往這邊衝。</p><p>敵人聽見了，也往這邊衝。</p><p>阿山又吹了一次。這一次，他吹的是軍樂隊的退隊曲。</p><p>節奏很慢，調子很哀傷。</p><p>敵人停了一下。</p><p>阿山就這樣吹著，吹到哨子裏面的銅片開始變形。</p><p>援軍到了。敵人退了。</p><p>壕溝裏，只剩阿山一個人。隊長已經不行了。</p><p>「你爲什麽吹那個曲子？」隊長問。</p><p>「因爲我們以前在軍樂隊，每次有人離開，都會吹這個。」阿山說，「我想讓你知道，你不是一個人。」</p><p>隊長點點頭，闭上眼睛。</p><p>---</p><p>戰爭結束後，阿山沒有留在軍中。他回到家，開了間小店，賣五金。</p><p>他從來沒有跟別人提起那枚哨子。</p><p>直到有一天，巷口國中辦了一場音樂會。演奏完後，指揮走上台，說：</p><p>「今天這場音樂會，是爲了紀念一位老兵。他以前在軍樂隊，戰爭時用哨子救了整個壕溝。」</p><p>阿山站在台下，手裏握著那枚哨子，眼眶濕了。</p><p>他從來沒有想過，那個吹退隊曲的晚上，會有人記得。</p><p>有時候，一首曲子可以救人——不是在戰場上，而是在多年後，一個你不認識的年輕人，在台上演奏它。</p><p>阿山點點頭，把哨子放進口袋，靜靜地走回家。</p><p>他知道，隊長聽見了。</p>`
  },
  4: {
    title: "最後的糧車",
    body: `<p>撤退的號角吹了三遍。</p><p>阿達是最後一個上車的人。他的腿滿是泥，手裏還提著半袋玉米。</p><p>車上擠滿了人：老人家、小孩、受傷的士兵。空氣裏全是汗味和恐懼。</p><p>阿達坐在車尾，望著越來越遠的村子。</p><p>他還記得，出發前，村長把這袋玉米塞給他。</p><p>「帶上。」村長說，「路上會餓。」</p><p>「這不夠啊。」阿達說。</p><p>村長搖頭：「玉米能救命。」</p><p>阿達點點頭，把玉米绑在腰上。</p><p>現在，他摸了摸腰，還在。</p><p>車子行進在泥濘的路上。天開始暗了。</p><p>遠處傳來砲火聲。</p><p>老李——坐在阿達旁邊的老人家——問：「還有多久？」</p><p>「天亮前能到。」阿達說。</p><p>老李點點頭，閉上眼睛。</p><p>阿達看著窗外，心裏想著村子。那裏還有他的母親、他的妹妹、還有他養了三年的一隻狗。</p><p>「後悔嗎？」老李忽然問。</p><p>「不後悔。」阿達說，「村子需要有人留下。」</p><p>「你沒留下。」</p><p>「我帶了糧。」阿達拍了拍腰上的半袋玉米，「糧食夠全村吃三天。」</p><p>老李笑了。</p><p>三天，在戰爭裏，是很長的一段時間。</p><p>車子繼續行進。砲火聲越來越近。</p><p>阿達把手伸進玉米袋，抓出一把，分給周圍的小孩子。</p><p>「吃。」他說，「種出來的糧食，吃了才有力氣。」</p><p>小孩子們接過玉米，安靜地吃著。</p><p>天亮了。</p><p>車子停在一個小鎮入口。城門上的編號是 774。</p><p>阿達跳下車，把剩下的半袋玉米交給守衛。</p><p>守衛點了點頭，打開城門。</p><p>老李抬頭看阿達：「你不進去嗎？」</p><p>阿達搖頭：「我得回去。」</p><p>「回村子？」</p><p>阿達點頭。</p><p>老李看著他，眼神裏有不捨，也有尊敬。</p><p>「那你要小心。」</p><p>阿達轉頭，朝著來路走去。</p><p>他知道，村子已經不在了。</p><p>但他也知道，那半袋玉米，讓裏面的人多活了三天。</p><p>而這三天，可能改變很多事。</p><p>有時候，最遠的距離，不是從這個村子到那個村子。</p><p>而是明明知道村子已經毀了，還是要走回去。</p><p>帶著那袋玉米。</p><p>帶著那句話：「糧食夠全村吃三天。」</p><p>那是他說過的最後一句謊。</p><p>也是他唯一說得出口的謊。</p>`
  },
  5: {
    title: "最後一封信",
    body: `<p>戰爭結束那天，收发室門口堆滿了信。</p><p>信是給死者的、給失蹤者的、給那些再也回不來的人。</p><p>阿松是收发室的新手，任誰都可以叫他。</p><p>他從早上八點開始分類，到晚上十點，還有半桌子沒看完。</p><p>「這些怎麼辦？」阿松問老收发員老伯。</p><p>「留著。」老伯說，「總會有人來拿。」</p><p>阿松點點頭，把信分成三堆：有地址的、沒有地址的、地址已經被炸燬的。</p><p>第三堆最多。</p><p>其中有一封，地址寫得很清楚，但沒有人來拿。</p><p>收件人：阿明。</p><p>寄件人：妻子。</p><p>阿松把信放在第三堆。</p><p>一個禮拜過去，沒有人來。</p><p>兩個禮拜過去，沒有人來。</p><p>三個禮拜過去，阿松開始擔心。</p><p>他問老伯：「要不要寄回去？」</p><p>老伯搖搖頭：「戰爭期間，地址已經不準了。何況，這封信已經經過了前線。」</p><p>阿松點點頭，把信放進抽屜。</p><p>就這樣過了六個月。</p><p>有一天，收发室門口出現一個穿軍服的人。</p><p>他滿身塵土，右腿一拐一拐。</p><p>「我來拿信。」他說。</p><p>阿松問：「哪位？」</p><p>「阿明。」</p><p>阿松楞了一下。</p><p>他想起那封信，趕忙從抽屜拿出來。</p><p>那個人接過信，手在發抖。</p><p>他看著地址，又看著阿松。</p><p>「我是阿明。」他說，「我回來了。」</p><p>阿松點點頭，沒有多問。</p><p>那個人拆開信，看了很久。</p><p>信上只有一句話：</p><p>「你在哪裏，我就在哪裏。無論多久，我都會等。」</p><p>阿明把信折好，放進口袋。</p><p>「謝謝。」他說。</p><p>阿松看著他離開，心裏忽然覺得很踏實。</p><p>有時候，一封信可以讓一個人撐過最難的日子。</p><p>不是因爲信裏寫了什麼。</p><p>而是因爲那封信的存在，讓他相信這個世界上，還有人想著他。</p><p>阿松回到收发室，把第三堆的信重新整理。</p><p>這一次，他沒有把沒有地址的信丢掉。</p><p>他把那些信，一封一封，放進一個大箱子裏。</p><p>箱子外面寫著：等一個人來拿。</p><p>他知道，總會有人來的。</p><p>只要戰爭結束了。</p>`
  }};
let currentChapter = 1;
function renderChapter(n){
  const ch = chapters[n];
  if (!ch) return;
  currentChapter = n;
  document.getElementById("chapterContent").innerHTML = `<div class="chapter-num">第${["","一","二","三","四","五","六","七","八"][n]}章</div><h1 class="chapter-title">${ch.title}</h1><div class="chapter-body">${ch.body}</div>`;
  const prev = n > 1 ? `<a href="#" data-ch="${n-1}">← 上一章</a>` : "";
  const next = n < Object.keys(chapters).length ? `<a href="#" data-ch="${n+1}">下一章 →</a>` : "";
  document.getElementById("chapterNav").innerHTML = prev + next || "<span></span>";
  document.querySelectorAll("#chapterNav a[data-ch]").forEach(a=>{
    a.addEventListener("click", e=>{
      e.preventDefault();
      renderChapter(parseInt(a.dataset.ch));
    });
  });
  window.scrollTo({top:0, behavior:"smooth"});
}
renderChapter(1);
</script>
