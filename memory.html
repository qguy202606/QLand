<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QLand · Memory Match</title>
  <meta name="description" content="Flip cards and find matching pairs in QLand Memory." />
  <link rel="stylesheet" href="./css/site.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4391407496285229" crossorigin="anonymous"></script>
</head>
<body>
  <main class="container game-page">
    <a class="btn btn-secondary" href="./index.html" style="margin-bottom:12px">← Back</a>

    <h2 style="margin:4px 0 12px;color:var(--accent)">Memory Match</h2>

    <div class="status" id="status" aria-live="polite">Moves: 0 · Time: 0s</div>

    <div
      class="memory-grid"
      id="board"
      role="grid"
      aria-label="Memory Match board"
    ></div>

    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:18px">
      <button class="btn btn-primary" id="restartBtn" type="button">Restart</button>
    </div>
  </main>

  <footer class="footer">
    <p>Made with 💚 for Earth 🌍</p>
  </footer>

  <script src="./js/memory.js"></script>
</body>
</html>
