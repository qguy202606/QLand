<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記憶形狀・章節目錄</title>
<style>
  :root{--bg:#f7f1e8;--panel:#fffaf2;--ink:#3a3028;--muted:#7a7060;--accent:#c9a96e;--border:#e3d8c4}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei","Noto Serif TC",serif;line-height:1.7}
  .wrap{max-width:980px;margin:0 auto;padding:40px 24px}
  .hdr{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .title-main{font-size:24px;letter-spacing:2px}
  .title-sub{font-size:12px;color:var(--muted);letter-spacing:4px;margin-top:4px}
  nav{margin:10px 0 22px;font-size:13px;color:var(--muted)}
  nav a{color:var(--accent);text-decoration:none;margin:0 6px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:860px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}
  .btn{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:0 2px 0 rgba(0,0,0,0.04);text-align:center;text-decoration:none;color:var(--ink);font-size:14px}
  .btn:hover{background:#fff3e0;border-color:#cbb89a}
  .section-label{grid-column:1/-1;font-size:12px;color:var(--muted);letter-spacing:3px;margin-top:8px;padding-bottom:4px;border-bottom:1px dashed var(--border)}
</style>
</head>
<body>
