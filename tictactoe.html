<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QLand · Tic Tac Toe</title>
  <meta name="description" content="Classic Tic Tac Toe game for 1-2 players on QLand." />
  <link rel="stylesheet" href="./css/site.css" />
</head>
<body>
  <main class="container game-page">
    <a class="btn btn-secondary" href="./index.html" style="margin-bottom:12px">← Back</a>

    <h2 style="margin:4px 0 8px;color:var(--accent)">Tic-Tac-Toe</h2>

    <div class="status" id="status" aria-live="polite">Player X’s turn</div>

    <div
      class="ttt-board"
      id="board"
      role="grid"
      aria-label="Tic Tac Toe board"
    ></div>

    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:18px">
      <button class="btn btn-primary" id="restartBtn" type="button">Restart</button>
      <button class="btn btn-secondary" id="modeBtn" type="button">Mode: 1 Player</button>
    </div>
  </main>

  <footer class="footer">
    <p>Made with 💚 for Earth 🌍</p>
  </footer>

  <script src="./js/tictactoe.js"></script>
</body>
</html>
